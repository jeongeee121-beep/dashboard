<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>계약 유지 현황 분석</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#f8f9fc;color:#1c1c2e;}

header{background:#1c1c2e;padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-dot{width:10px;height:10px;border-radius:50%;background:#FFA94D;}
.logo-text{font-size:16px;font-weight:700;color:#fff;}
.header-sub{font-size:12px;color:#666;}

.connect-bar{background:#fff;border-bottom:1px solid #eee;padding:12px 40px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.connect-bar label{font-size:12px;color:#888;}
.connect-bar input{padding:7px 12px;font-size:13px;font-family:inherit;border:1.5px solid #e8e8f0;border-radius:10px;background:#fafafa;color:#1c1c2e;}
.connect-bar input.wide{width:300px;}
.connect-bar input:focus{outline:none;border-color:#FFA94D;}
.btn-load{padding:7px 18px;background:#FFA94D;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;}
.btn-load:hover{background:#e8942a;}
#statusMsg{font-size:12px;}

main{max-width:1320px;margin:0 auto;padding:28px 40px;}

/* 요약 카드 */
.metric-grid{display:grid;gap:16px;margin-bottom:28px;}
.g5{grid-template-columns:repeat(5,1fr);}
.g4{grid-template-columns:repeat(4,1fr);}
.g3{grid-template-columns:repeat(3,1fr);}
.metric-card{background:#fff;border-radius:16px;padding:18px 20px;border:1px solid #f0f0f8;position:relative;overflow:hidden;}
.metric-card::after{content:'';position:absolute;top:0;left:0;width:4px;height:100%;border-radius:16px 0 0 16px;}
.mc1::after{background:#6C63FF;}.mc2::after{background:#22c997;}.mc3::after{background:#FF6B6B;}.mc4::after{background:#FFA94D;}.mc5::after{background:#4dabf7;}
.metric-label{font-size:11px;color:#999;margin-bottom:6px;}
.metric-value{font-size:24px;font-weight:700;letter-spacing:-1px;}
.metric-sub{font-size:11px;color:#bbb;margin-top:4px;}

.section-title{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.section-title::before{content:'';display:inline-block;width:4px;height:18px;background:#FFA94D;border-radius:2px;}

.chart-row{display:grid;gap:20px;margin-bottom:24px;}
.chart-row.two{grid-template-columns:1fr 1fr;}
.chart-row.three{grid-template-columns:1fr 1fr 1fr;}
.card{background:#fff;border-radius:16px;padding:24px;border:1px solid #f0f0f8;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.card-title{font-size:14px;font-weight:600;}
.card-badge{font-size:11px;color:#FFA94D;background:#fff8ee;padding:3px 10px;border-radius:20px;}
.card-tip{font-size:11px;color:#bbb;}

/* 검색/필터 */
.filter-bar{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap;}
.filter-bar input{padding:8px 14px;font-size:13px;font-family:inherit;border:1.5px solid #e8e8f0;border-radius:10px;background:#fff;color:#1c1c2e;width:220px;}
.filter-bar input:focus{outline:none;border-color:#FFA94D;}
.filter-btn{padding:7px 16px;border-radius:50px;font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;border:1.5px solid #e0e0ee;background:#fff;color:#888;transition:all 0.2s;}
.filter-btn:hover{border-color:#FFA94D;color:#FFA94D;}
.filter-btn.active{background:#FFA94D;color:#fff;border-color:#FFA94D;}

/* 거래처 테이블 */
.biz-table{width:100%;border-collapse:collapse;font-size:13px;}
.biz-table th{padding:10px 14px;background:#f8f9fc;font-weight:600;color:#555;text-align:left;border-bottom:2px solid #e8e8f0;white-space:nowrap;cursor:pointer;user-select:none;}
.biz-table th:hover{background:#f0f0f8;}
.biz-table th.sort-asc::after{content:' ▲';font-size:10px;color:#FFA94D;}
.biz-table th.sort-desc::after{content:' ▼';font-size:10px;color:#FFA94D;}
.biz-table td{padding:10px 14px;border-bottom:1px solid #f5f5f8;vertical-align:top;}
.biz-table tr:hover td{background:#fafafe;}
.biz-table tr.expandable{cursor:pointer;}
.biz-table tr.detail-row{background:#f8f9fc;}
.biz-table tr.detail-row td{padding:0;}

.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;}
.tag-act{background:#e8f8f0;color:#1a7a4a;}
.tag-end{background:#fde8e8;color:#a32d2d;}
.tag-mix{background:#fff3e0;color:#854f0b;}

.detail-inner{padding:14px 20px;border-left:3px solid #FFA94D;margin:0 14px 14px 40px;background:#fff;border-radius:8px;font-size:12px;}
.detail-inner table{width:100%;border-collapse:collapse;}
.detail-inner th{padding:6px 10px;background:#f8f9fc;font-size:11px;color:#888;text-align:left;border-bottom:1px solid #eee;}
.detail-inner td{padding:6px 10px;border-bottom:1px solid #f5f5f8;font-size:12px;}
.detail-inner td:last-child,.detail-inner th:last-child{text-align:right;}

/* 차트 */
.chart-wrap{position:relative;height:220px;}
.bar-item{margin-bottom:11px;}
.bar-meta{display:flex;justify-content:space-between;margin-bottom:4px;}
.bar-name{font-size:13px;color:#333;}
.bar-count{font-size:12px;color:#999;}
.bar-track{background:#f3f3f8;border-radius:5px;height:7px;overflow:hidden;}
.bar-fill{height:100%;border-radius:5px;transition:width 0.8s cubic-bezier(0.4,0,0.2,1);}

.donut-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.donut-canvas-wrap{position:relative;width:150px;height:150px;flex-shrink:0;}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;}
.donut-center-val{font-size:18px;font-weight:700;line-height:1;}
.donut-center-label{font-size:11px;color:#999;margin-top:3px;}
.donut-legend{flex:1;min-width:110px;}
.legend-item{display:flex;align-items:center;gap:7px;margin-bottom:8px;font-size:12px;}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.legend-name{color:#333;flex:1;}
.legend-val{color:#999;font-size:11px;white-space:nowrap;}

.empty{color:#ccc;font-size:13px;text-align:center;padding:40px;}
.name-tooltip{position:fixed;background:#1c1c2e;color:#fff;font-size:12px;line-height:1.8;padding:8px 14px;border-radius:10px;pointer-events:none;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.2);white-space:pre;}
.info-box{background:#fff8ee;border:1px solid #ffe0a0;border-radius:12px;padding:14px 18px;font-size:13px;color:#854f0b;margin-bottom:20px;line-height:1.7;}

@media(max-width:900px){
  main{padding:20px 16px;}
  header,.connect-bar{padding-left:16px;padding-right:16px;}
  .metric-grid.g5{grid-template-columns:repeat(2,1fr);}
  .metric-grid.g4{grid-template-columns:repeat(2,1fr);}
  .chart-row.two,.chart-row.three{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div><span class="logo-text">계약 유지 현황 분석</span></div>
  <span class="header-sub" id="lastUpdate">증차 기준 수립을 위한 분석 도구</span>
</header>

<div class="connect-bar">
  <label>시트 ID</label>
  <input class="wide" id="sheetId" value="14j3hDW3Hn-1ftkJlqZhEZhWTt38eZU8S4yMoadenrR4"/>
  <button class="btn-load" onclick="loadData()">불러오기</button>
  <span id="statusMsg"></span>
</div>

<main id="mainContent" style="display:none;">

  <div class="info-box">
    💡 <strong>분석 기준:</strong> 거래처코드별 계약 현황을 분석합니다. 2대 이상 출고 거래처의 증차 텀, 해지 사유, 유지 기간을 확인하세요.
  </div>

  <!-- 요약 -->
  <div class="metric-grid g5" id="summaryCards"></div>

  <!-- 차트 -->
  <div class="chart-row two">
    <div class="card">
      <div class="card-header"><span class="card-title">해지 사유 TOP 10</span><span class="card-tip">전체 해지 건 기준</span></div>
      <div id="reasonBar"></div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">해지까지 걸린 기간 분포</span><span class="card-tip">계약실행일 → 마감일자 기준</span></div>
      <div class="chart-wrap"><canvas id="durationChart"></canvas></div>
    </div>
  </div>

  <div class="chart-row two">
    <div class="card">
      <div class="card-header"><span class="card-title">증차 텀 분포 (2대 이상 거래처)</span><span class="card-tip">첫 출고 → 두번째 출고 기간</span></div>
      <div class="chart-wrap"><canvas id="termChart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">거래처별 계약 대수 분포</span></div>
      <div class="donut-wrap" style="padding-top:8px;">
        <div class="donut-canvas-wrap"><canvas id="cntDonut"></canvas><div class="donut-center"><div class="donut-center-val" id="donutTotal">-</div><div class="donut-center-label">거래처</div></div></div>
        <div class="donut-legend" id="cntLegend"></div>
      </div>
    </div>
  </div>

  <!-- 거래처 목록 -->
  <div class="section-title">거래처별 상세 현황</div>
  <div class="filter-bar" style="margin-bottom:10px;">
    <input type="text" id="searchInput" placeholder="거래처코드 / 거래처명 검색..." oninput="renderTable()"/>
    <span style="font-size:12px;color:#bbb;margin:0 4px;">|</span>
    <button class="filter-btn active" onclick="setBizType('all')" id="bt_all">전체</button>
    <button class="filter-btn" onclick="setBizType('개인')" id="bt_개인">개인</button>
    <button class="filter-btn" onclick="setBizType('개인사업자')" id="bt_개인사업자">개인사업자</button>
    <button class="filter-btn" onclick="setBizType('법인')" id="bt_법인">법인</button>
    <span style="font-size:12px;color:#bbb;margin:0 6px;">|</span>
    <span style="font-size:12px;color:#aaa;">상품구분</span>
    <button class="filter-btn active" onclick="setProd('all')" id="bp_all">전체</button>
    <button class="filter-btn" onclick="setProd('신차')" id="bp_신차">신차</button>
    <button class="filter-btn" onclick="setProd('재렌트')" id="bp_재렌트">재렌트</button>
  </div>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all')" id="f_all">전체</button>
    <button class="filter-btn" onclick="setFilter('multi')" id="f_multi">2대 이상</button>
    <button class="filter-btn" onclick="setFilter('term')" id="f_term">증차 있음</button>
    <button class="filter-btn" onclick="setFilter('end')" id="f_end">해지 있음</button>
    <span id="tableCount" style="font-size:12px;color:#aaa;margin-left:8px;"></span>
  </div>
  <div class="card" style="margin-bottom:40px;overflow-x:auto;">
    <table class="biz-table" id="bizTable">
      <thead>
        <tr>
          <th style="width:32px;"></th>
          <th onclick="sortTable('code')">거래처코드</th>
          <th onclick="sortTable('name')">거래처명</th>
          <th onclick="sortTable('bizType')">구분</th>
          <th>상품구분</th>
          <th onclick="sortTable('total')">총 계약</th>
          <th onclick="sortTable('active')">유지 중</th>
          <th onclick="sortTable('ended')">해지/종료</th>
          <th onclick="sortTable('rate')">유지율</th>
          <th onclick="sortTable('term')">평균 증차 텀</th>
          <th onclick="sortTable('duration')">평균 유지기간</th>
          <th>주요 해지사유</th>
        </tr>
      </thead>
      <tbody id="bizTbody"></tbody>
    </table>
  </div>

</main>

<script>
const COLORS=['#6C63FF','#22c997','#FF6B6B','#FFA94D','#4dabf7','#f06595','#a9e34b','#74c0fc','#e599f7','#ffd43b'];
let rawData=[], bizMap={}, charts={}, currentFilter='all', sortKey='total', sortDir=-1, bizTypeFilter='all', prodFilter='all';

function setStatus(msg,ok){const el=document.getElementById('statusMsg');el.textContent=msg;el.style.color=ok===false?'#FF6B6B':ok===true?'#22c997':'#999';}

async function loadData(){
  const id=document.getElementById('sheetId').value.trim();
  if(!id){setStatus('시트 ID를 입력해주세요.',false);return;}
  setStatus('불러오는 중...',null);
  const url=`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent('판매현황테스트')}`;
  try{
    const res=await fetch(url);const text=await res.text();
    const match=text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
    if(!match)throw new Error('파싱 실패');
    const json=JSON.parse(match[1]);
    if(!json.table?.rows?.length)throw new Error('데이터 없음');

    const cols=json.table.cols.map(c=>c.label);
    const rows=json.table.rows.map(r=>r.c.map(c=>c?c.v:null));
    const idx=n=>cols.findIndex(c=>c&&c.includes(n));

    const iCode=idx('거래처코드'), iExec=idx('계약실행일'), iEnd=idx('계약종료일');
    const iReason=idx('회수상세사유'), iProd=idx('상품구분'), iType=idx('상품유형');
    const iClose=idx('마감일자'), iStatus=idx('실행상태'), iNo=idx('No');
    const iName=idx('계약자'), iWorker=idx('수행원');
    console.log('계약자(거래처명) idx:',iName,'수행원 idx:',iWorker);

    // 실제 컬럼 인덱스 디버그
    console.log('거래처코드 idx:',iCode,'계약실행일:',iExec,'계약종료일:',iEnd,'회수상세사유:',iReason,'마감일자:',iClose);

    const iBizType=idx('거래처구분');
    console.log('거래처구분 idx:',iBizType);
    rawData=rows.map(r=>({
      code:(r[iCode]||'').toString().trim(),
      name:(r[iName]||'').toString().trim(),
      worker:(r[iWorker]||'').toString().trim(),
      execDate:parseDate(r[iExec]),
      endDate:parseDate(r[iEnd]||r[iClose]),
      closeDate:parseDate(r[iClose]),
      reason:(r[iReason]||'').toString().trim(),
      prod:(r[iProd]||'').toString().trim(),
      type:(r[iType]||'').toString().trim(),
      status:(r[iStatus]||'').toString().trim(),
      bizType:(r[iBizType]||'').toString().trim(),
    })).filter(r=>r.code && !r.prod.includes('월렌트'));

    buildBizMap();
    renderAll();
    document.getElementById('mainContent').style.display='block';
    const now=new Date();
    document.getElementById('lastUpdate').textContent=`${now.toLocaleDateString('ko-KR')} 기준 · ${rawData.length.toLocaleString()}건`;
    setStatus(`✓ ${rawData.length.toLocaleString()}건 로드 완료`,true);
  }catch(e){setStatus('❌ '+e.message,false);console.error(e);}
}

function parseDate(v){
  if(!v)return null;
  const d=v.toString().match(/Date\((\d{4}),(\d+),(\d+)\)/);
  if(d)return new Date(parseInt(d[1]),parseInt(d[2]),parseInt(d[3]));
  const m=v.toString().match(/(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/);
  if(m)return new Date(parseInt(m[1]),parseInt(m[2])-1,parseInt(m[3]));
  return null;
}

function monthDiff(a,b){
  if(!a||!b)return null;
  return(b.getFullYear()-a.getFullYear())*12+(b.getMonth()-a.getMonth());
}

function isEnded(r){
  // 마감일자가 있거나 실행상태에 해지/종료 포함
  return r.closeDate!==null || r.status.includes('해지')||r.status.includes('종료')||r.status.includes('마감');
}

function buildBizMap(){
  bizMap={};
  rawData.forEach(r=>{
    if(!r.code)return;
    if(!bizMap[r.code])bizMap[r.code]={code:r.code,rows:[],active:0,ended:0,reasons:[],durations:[],terms:[],bizType:r.bizType||'미분류',name:r.name||'',workers:new Set(),prods:new Set()};
    if(r.worker)bizMap[r.code].workers.add(r.worker);
    if(r.prod)bizMap[r.code].prods.add(r.prod);
    bizMap[r.code].rows.push(r);
    if(isEnded(r)){
      bizMap[r.code].ended++;
      if(r.reason)bizMap[r.code].reasons.push(r.reason);
      const dur=monthDiff(r.execDate,r.closeDate||r.endDate);
      if(dur!==null&&dur>=0)bizMap[r.code].durations.push(dur);
    } else {
      bizMap[r.code].active++;
    }
  });

  // 증차 텀 계산 (같은 거래처 2대 이상, 계약실행일 순)
  Object.values(bizMap).forEach(biz=>{
    const sorted=biz.rows.filter(r=>r.execDate).sort((a,b)=>a.execDate-b.execDate);
    for(let i=1;i<sorted.length;i++){
      const t=monthDiff(sorted[i-1].execDate,sorted[i].execDate);
      if(t!==null&&t>=0)biz.terms.push(t);
    }
    biz.total=biz.active+biz.ended;
    biz.rate=biz.total>0?Math.round(biz.active/biz.total*100):0;
    biz.avgTerm=biz.terms.length?Math.round(biz.terms.reduce((a,b)=>a+b,0)/biz.terms.length):null;
    biz.avgDur=biz.durations.length?Math.round(biz.durations.reduce((a,b)=>a+b,0)/biz.durations.length):null;
    biz.topReason=biz.reasons.length?Object.entries(biz.reasons.reduce((m,r)=>{m[r]=(m[r]||0)+1;return m;},{})).sort((a,b)=>b[1]-a[1])[0]?.[0]:'';
  });
}

function renderAll(){
  renderSummary();
  renderReasonBar();
  renderDurationChart();
  renderTermChart();
  renderCntDonut();
  renderTable();
}

function renderSummary(){
  const all=Object.values(bizMap);
  const totalBiz=all.length;
  const totalContracts=rawData.length;
  const multiBiz=all.filter(b=>b.total>=2).length;
  const endedTotal=rawData.filter(r=>isEnded(r)).length;
  const activeTotal=rawData.filter(r=>!isEnded(r)).length;
  const overallRate=totalContracts>0?Math.round(activeTotal/totalContracts*100):0;
  const withTerm=all.filter(b=>b.avgTerm!==null);
  const avgTermAll=withTerm.length?Math.round(withTerm.reduce((a,b)=>a+b.avgTerm,0)/withTerm.length):null;

  document.getElementById('summaryCards').innerHTML=`
    <div class="metric-card mc1"><div class="metric-label">전체 거래처 수</div><div class="metric-value">${totalBiz.toLocaleString()}</div><div class="metric-sub">거래처코드 기준</div></div>
    <div class="metric-card mc2"><div class="metric-label">총 계약 건수</div><div class="metric-value">${totalContracts.toLocaleString()}</div><div class="metric-sub">전체 데이터</div></div>
    <div class="metric-card mc3"><div class="metric-label">전체 유지율</div><div class="metric-value">${overallRate}%</div><div class="metric-sub">유지 ${activeTotal}건 / 해지 ${endedTotal}건</div></div>
    <div class="metric-card mc4"><div class="metric-label">2대 이상 거래처</div><div class="metric-value">${multiBiz.toLocaleString()}</div><div class="metric-sub">증차 분석 대상</div></div>
    <div class="metric-card mc5"><div class="metric-label">평균 증차 텀</div><div class="metric-value">${avgTermAll!==null?avgTermAll+'개월':'-'}</div><div class="metric-sub">2대 이상 거래처 기준</div></div>
  `;
}

function renderReasonBar(){
  const reasonMap={};
  rawData.filter(r=>isEnded(r)&&r.reason).forEach(r=>{reasonMap[r.reason]=(reasonMap[r.reason]||0)+1;});
  const entries=Object.entries(reasonMap).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const total=entries.reduce((s,[,v])=>s+v,0);
  const el=document.getElementById('reasonBar');
  if(!entries.length){el.innerHTML='<div class="empty">해지 사유 데이터 없음</div>';return;}
  el.innerHTML=entries.map(([k,v],i)=>`
    <div class="bar-item">
      <div class="bar-meta"><span class="bar-name">${k||'(없음)'}</span><span class="bar-count">${v}건 · ${total?Math.round(v/total*100):0}%</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${total?Math.round(v/total*100):0}%;background:${COLORS[i%COLORS.length]};"></div></div>
    </div>`).join('');
}

function renderDurationChart(){
  // 해지까지 기간 분포 (0-3, 4-6, 7-12, 13-24, 25+ 개월)
  const buckets=['3개월 이하','4~6개월','7~12개월','13~24개월','25개월 이상'];
  const counts=[0,0,0,0,0];
  rawData.filter(r=>isEnded(r)&&r.execDate&&(r.closeDate||r.endDate)).forEach(r=>{
    const d=monthDiff(r.execDate,r.closeDate||r.endDate);
    if(d===null||d<0)return;
    if(d<=3)counts[0]++;else if(d<=6)counts[1]++;else if(d<=12)counts[2]++;else if(d<=24)counts[3]++;else counts[4]++;
  });
  const canvas=document.getElementById('durationChart');
  if(charts['dur'])charts['dur'].destroy();
  charts['dur']=new Chart(canvas.getContext('2d'),{
    type:'bar',
    data:{labels:buckets,datasets:[{data:counts,backgroundColor:['#FF6B6B','#FFA94D','#ffd43b','#22c997','#6C63FF'],borderRadius:6,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},border:{display:false},ticks:{font:{size:11}}},y:{grid:{color:'#f0f0f8'},border:{display:false},ticks:{font:{size:11}},beginAtZero:true}}}
  });
}

function renderTermChart(){
  // 증차 텀 분포
  const allTerms=[];
  Object.values(bizMap).forEach(b=>b.terms.forEach(t=>allTerms.push(t)));
  const buckets=['1개월 이하','2~3개월','4~6개월','7~12개월','13개월 이상'];
  const counts=[0,0,0,0,0];
  allTerms.forEach(t=>{
    if(t<=1)counts[0]++;else if(t<=3)counts[1]++;else if(t<=6)counts[2]++;else if(t<=12)counts[3]++;else counts[4]++;
  });
  const canvas=document.getElementById('termChart');
  if(charts['term'])charts['term'].destroy();
  if(!allTerms.length){canvas.parentElement.innerHTML='<div class="empty">2대 이상 출고 데이터 없음</div>';return;}
  charts['term']=new Chart(canvas.getContext('2d'),{
    type:'bar',
    data:{labels:buckets,datasets:[{data:counts,backgroundColor:'#FFA94D',borderRadius:6,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},border:{display:false},ticks:{font:{size:11}}},y:{grid:{color:'#f0f0f8'},border:{display:false},ticks:{font:{size:11}},beginAtZero:true}}}
  });
}

function renderCntDonut(){
  const all=Object.values(bizMap);
  const c1=all.filter(b=>b.total===1).length;
  const c2=all.filter(b=>b.total===2).length;
  const c3=all.filter(b=>b.total===3).length;
  const c4=all.filter(b=>b.total>=4).length;
  const data=[['1대',c1],['2대',c2],['3대',c3],['4대 이상',c4]].filter(([,v])=>v>0);
  const total=data.reduce((s,[,v])=>s+v,0);
  document.getElementById('donutTotal').textContent=total;
  const canvas=document.getElementById('cntDonut');
  if(charts['cntD'])charts['cntD'].destroy();
  charts['cntD']=new Chart(canvas.getContext('2d'),{
    type:'doughnut',
    data:{labels:data.map(([k])=>k),datasets:[{data:data.map(([,v])=>v),backgroundColor:COLORS,borderWidth:2,borderColor:'#fff',hoverOffset:6}]},
    options:{cutout:'65%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${ctx.raw}개 거래처 (${Math.round(ctx.raw/total*100)}%)`}}}}
  });
  document.getElementById('cntLegend').innerHTML=data.map(([k,v],i)=>`<div class="legend-item"><div class="legend-dot" style="background:${COLORS[i]}"></div><span class="legend-name">${k}</span><span class="legend-val">${v}개 (${Math.round(v/total*100)}%)</span></div>`).join('');
}

function setBizType(t){
  bizTypeFilter=t;
  ['all','개인','개인사업자','법인'].forEach(k=>{const el=document.getElementById(`bt_${k}`);if(el)el.classList.toggle('active',k===t);});
  renderTable();
}

function setProd(p){
  prodFilter=p;
  ['all','신차','재렌트'].forEach(k=>{const el=document.getElementById('bp_'+k);if(el)el.classList.toggle('active',k===p);});
  renderTable();
}

function setFilter(f){
  currentFilter=f;
  ['all','multi','term','end'].forEach(k=>{const el=document.getElementById(`f_${k}`);if(el)el.classList.toggle('active',k===f);});
  renderTable();
}

let expandedRows=new Set();
function sortTable(key){
  if(sortKey===key)sortDir*=-1;else{sortKey=key;sortDir=-1;}
  document.querySelectorAll('.biz-table th').forEach(th=>{th.classList.remove('sort-asc','sort-desc');});
  renderTable();
}

function renderTable(){
  const search=document.getElementById('searchInput').value.toLowerCase();
  let list=Object.values(bizMap);

  if(search)list=list.filter(b=>b.code.toLowerCase().includes(search)||b.name.toLowerCase().includes(search));
  if(bizTypeFilter!=='all')list=list.filter(b=>b.bizType===bizTypeFilter);
  if(prodFilter!=='all')list=list.filter(b=>[...b.prods].some(p=>p.includes(prodFilter)));
  if(currentFilter==='multi')list=list.filter(b=>b.total>=2);
  if(currentFilter==='term')list=list.filter(b=>b.avgTerm!==null);
  if(currentFilter==='end')list=list.filter(b=>b.ended>0);

  list.sort((a,b)=>{
    let va,vb;
    if(sortKey==='code'){va=a.code;vb=b.code;return sortDir*(va<vb?-1:va>vb?1:0);}
    if(sortKey==='name'){va=a.name;vb=b.name;return sortDir*(va<vb?-1:va>vb?1:0);}
    if(sortKey==='bizType'){va=a.bizType;vb=b.bizType;return sortDir*(va<vb?-1:va>vb?1:0);}
    if(sortKey==='rate'){va=a.rate;vb=b.rate;}
    else if(sortKey==='term'){va=a.avgTerm??-1;vb=b.avgTerm??-1;}
    else if(sortKey==='duration'){va=a.avgDur??-1;vb=b.avgDur??-1;}
    else if(sortKey==='active'){va=a.active;vb=b.active;}
    else if(sortKey==='ended'){va=a.ended;vb=b.ended;}
    else{va=a.total;vb=b.total;}
    return sortDir*(va-vb);
  });

  document.getElementById('tableCount').textContent=`${list.length.toLocaleString()}개 거래처`;

  const tbody=document.getElementById('bizTbody');
  tbody.innerHTML=list.map(b=>{
    const rateColor=b.rate>=80?'#1a7a4a':b.rate>=50?'#854f0b':'#a32d2d';
    const tag=b.ended===0?'<span class="tag tag-act">전체유지</span>':b.active===0?'<span class="tag tag-end">전체해지</span>':'<span class="tag tag-mix">혼재</span>';
    const termStr=b.avgTerm!==null?`${b.avgTerm}개월`:'-';
    const durStr=b.avgDur!==null?`${b.avgDur}개월`:'-';
    const isExp=expandedRows.has(b.code);
    return`<tr class="expandable" onclick="toggleRow('${b.code}')">
      <td style="text-align:center;color:#ccc;">${isExp?'▲':'▼'}</td>
      <td style="font-weight:600;color:#888;font-size:12px;">${b.code}</td>
      <td style="font-weight:600;position:relative;" class="name-cell" data-workers="${[...b.workers].join(', ')||'정보없음'}">${b.name||b.code} <span style="font-size:10px;color:#ccc;">👆</span></td>
      <td><span style="font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;background:${b.bizType==='법인'?'#e8eeff':b.bizType==='개인사업자'?'#fff3e0':'#f0faf6'};color:${b.bizType==='법인'?'#3a56d4':b.bizType==='개인사업자'?'#854f0b':'#1a7a4a'};">${b.bizType||'-'}</span></td>
      <td style="font-weight:700;">${b.total}</td>
      <td style="color:#22c997;font-weight:600;">${b.active}</td>
      <td style="color:#FF6B6B;font-weight:600;">${b.ended}</td>
      <td><span style="font-weight:700;color:${rateColor};">${b.rate}%</span></td>
      <td>${termStr}${b.terms.length>1?`<span style="font-size:11px;color:#bbb;"> (${b.terms.length}건)</span>`:''}</td>
      <td>${durStr}</td>
      <td style="font-size:12px;color:#888;">${b.topReason||'-'} ${tag}</td>
    </tr>
    <tr class="detail-row" id="detail_${b.code}" style="display:${isExp?'table-row':'none'};">
      <td colspan="12">${buildDetailHTML(b)}</td>
    </tr>`;
  }).join('');
}

function toggleRow(code){
  if(expandedRows.has(code))expandedRows.delete(code);else expandedRows.add(code);
  renderTable();
}

// 거래처명 hover 툴팁
document.addEventListener('mouseover',e=>{
  const cell=e.target.closest('.name-cell');
  if(!cell)return;
  const workers=cell.getAttribute('data-workers');
  if(!workers)return;
  let box=document.createElement('div');
  box.className='name-tooltip';
  box.innerText='👤 담당 수행자\n'+workers;
  box.id='nameTip';
  document.body.appendChild(box);
  moveTip(box,e);
});
document.addEventListener('mousemove',e=>{
  const box=document.getElementById('nameTip');
  if(box)moveTip(box,e);
  if(!e.target.closest('.name-cell')&&box){box.remove();}
});
document.addEventListener('mouseout',e=>{
  if(!e.target.closest('.name-cell')){const box=document.getElementById('nameTip');if(box)box.remove();}
});

function moveTip(box,e){
  const bw=box.offsetWidth||160,bh=box.offsetHeight||50,vw=window.innerWidth,vh=window.innerHeight;
  let x=e.clientX+14,y=e.clientY-10;
  if(x+bw>vw-10)x=e.clientX-bw-10;
  if(y+bh>vh-10)y=vh-bh-10;
  box.style.left=x+'px';box.style.top=y+'px';
}

function buildDetailHTML(b){
  const sorted=b.rows.filter(r=>r.execDate).sort((a,b)=>a.execDate-b.execDate);
  const rows=sorted.map((r,i)=>{
    const prev=sorted[i-1];
    const term=prev?monthDiff(prev.execDate,r.execDate):null;
    const dur=isEnded(r)&&r.execDate&&(r.closeDate||r.endDate)?monthDiff(r.execDate,r.closeDate||r.endDate):null;
    const statusColor=isEnded(r)?'#FF6B6B':'#22c997';
    return`<tr>
      <td>${i+1}호차</td>
      <td>${r.execDate?r.execDate.toLocaleDateString('ko-KR'):'-'}</td>
      <td>${r.prod} / ${r.type||'-'}</td>
      <td style="color:${statusColor};font-weight:600;">${isEnded(r)?'해지/종료':'유지 중'}</td>
      <td>${r.closeDate?r.closeDate.toLocaleDateString('ko-KR'):'-'}</td>
      <td>${dur!==null?dur+'개월':'-'}</td>
      <td style="color:#FFA94D;font-weight:600;">${term!==null?'+'+term+'개월 후':'-'}</td>
      <td>${r.reason||'-'}</td>
    </tr>`;
  }).join('');

  return`<div class="detail-inner">
    <table>
      <thead><tr><th>순서</th><th>계약실행일</th><th>상품</th><th>상태</th><th>해지일</th><th>유지기간</th><th>증차 텀</th><th>해지사유</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}
</script>
</body>
</html>
