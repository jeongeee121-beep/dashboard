<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>판매지원팀 판매현황</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f2f7;color:#1c1c2e;font-size:14px;}

/* TOP BAR */
.topbar{background:#fff;border-bottom:1px solid #e8e8f0;padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:12px;}
.topbar-left{display:flex;align-items:center;gap:16px;}
.app-title{font-size:17px;font-weight:700;letter-spacing:-0.3px;white-space:nowrap;}
.tab-nav{display:flex;gap:2px;}
.tab-nav-btn{padding:6px 16px;border-radius:8px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;border:none;background:transparent;color:#999;transition:all 0.2s;}
.tab-nav-btn.active{background:#6C63FF;color:#fff;}
.tab-nav-btn:hover:not(.active){background:#f0f0f8;color:#555;}
.topbar-right{display:flex;align-items:center;gap:10px;white-space:nowrap;}
.last-update{font-size:11px;color:#bbb;}

/* CONNECT */
.connect-bar{background:#fff;border-bottom:1px solid #eee;padding:10px 28px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.connect-bar label{font-size:12px;color:#888;}
.connect-bar input{padding:7px 12px;font-size:13px;font-family:inherit;border:1.5px solid #e8e8f0;border-radius:8px;background:#fafafa;color:#1c1c2e;width:280px;}
.connect-bar input:focus{outline:none;border-color:#6C63FF;}
.btn-load{padding:7px 16px;background:#6C63FF;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;}
.btn-load:hover{background:#574fd6;}
#statusMsg{font-size:12px;}

/* PERIOD BAR */
.period-bar{background:#fff;border-bottom:1px solid #e8e8f0;padding:10px 28px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.period-seg{display:flex;background:#f0f0f8;border-radius:8px;padding:3px;}
.seg-btn{padding:5px 14px;border-radius:6px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;border:none;background:transparent;color:#888;transition:all 0.15s;}
.seg-btn.active{background:#fff;color:#6C63FF;box-shadow:0 1px 4px rgba(0,0,0,0.1);}
.period-sep{width:1px;height:20px;background:#e0e0ee;margin:0 4px;}
.period-sel{padding:6px 12px;border:1.5px solid #e0e0ee;border-radius:8px;font-size:13px;font-family:inherit;background:#fff;cursor:pointer;color:#333;}
.period-sel:focus{outline:none;border-color:#6C63FF;}
.trend-btn-top{padding:6px 16px;border-radius:8px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;border:1.5px solid #6C63FF;background:#fff;color:#6C63FF;margin-left:auto;transition:all 0.2s;}
.trend-btn-top.active{background:#6C63FF;color:#fff;}

/* SHEET TABS (하단 탭) */
.sheet-tabs{background:#fff;border-bottom:2px solid #eee;padding:0 28px;display:flex;overflow-x:auto;}
.sheet-tab{padding:12px 18px;font-size:13px;font-weight:500;color:#aaa;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.2s;font-family:inherit;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap;}
.sheet-tab:hover{color:#6C63FF;}
.sheet-tab.active{color:#6C63FF;border-bottom-color:#6C63FF;}
.tab-badge{display:inline-block;margin-left:5px;font-size:10px;background:#f0eeff;color:#6C63FF;padding:1px 6px;border-radius:20px;}

main{max-width:1400px;margin:0 auto;padding:20px 28px 40px;}
.sheet-panel{display:none;}
.car-item{padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:#555;display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;}
.car-item:hover{background:#f0eeff;color:#6C63FF;}
.car-item.active{background:#6C63FF;color:#fff;font-weight:600;}
.car-item .car-cnt{font-size:11px;opacity:0.7;}
.car-detail-panel{background:#fff;border-radius:12px;padding:20px;border:1px solid #ebebf5;margin-top:16px;}
.seg-mini{display:flex;background:#f0f0f8;border-radius:8px;padding:3px;gap:2px;display:inline-flex;}
.seg-mini-btn{padding:4px 14px;border-radius:6px;font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;border:none;background:transparent;color:#888;transition:all 0.15s;}
.seg-mini-btn.active{background:#fff;color:#6C63FF;box-shadow:0 1px 4px rgba(0,0,0,0.1);}
.section-title-mini{font-size:14px;font-weight:700;color:#1c1c2e;margin-bottom:12px;padding-left:8px;border-left:3px solid #6C63FF;}
.sheet-panel.active{display:block;}

/* SUMMARY CARDS */
.summary-row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:16px;margin-bottom:20px;align-items:stretch;}
.sum-card{background:#fff;border-radius:14px;padding:18px 22px;border:1px solid #ebebf5;}
.sum-label{font-size:12px;color:#999;margin-bottom:4px;}
.sum-value{font-size:30px;font-weight:700;letter-spacing:-1px;line-height:1.1;}
.sum-sub{font-size:12px;margin-top:6px;display:flex;align-items:center;gap:4px;}
.sum-mini-chart{width:80px;height:30px;margin-top:6px;}
.up{color:#22c997;}.dn{color:#FF6B6B;}.eq{color:#aaa;}
.yoy-card{background:#fff;border-radius:14px;padding:18px 22px;border:1px solid #ebebf5;display:flex;flex-direction:column;justify-content:space-between;}
.yoy-title{font-size:12px;font-weight:600;color:#666;margin-bottom:10px;}
.yoy-items{display:flex;gap:16px;flex-wrap:wrap;}
.yoy-item{text-align:center;}
.yoy-item-icon{font-size:18px;margin-bottom:4px;}
.yoy-item-label{font-size:11px;color:#999;margin-bottom:2px;}
.yoy-item-val{font-size:16px;font-weight:700;}

/* MAIN GRID */
.main-grid{display:grid;grid-template-columns:1fr 1fr auto;gap:16px;margin-bottom:16px;}
.main-grid.wide{grid-template-columns:1fr 1fr 380px;}
.card{background:#fff;border-radius:14px;padding:20px;border:1px solid #ebebf5;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.card-title{font-size:13px;font-weight:600;color:#1c1c2e;display:flex;align-items:center;gap:6px;}
.card-title::before{content:'';display:inline-block;width:3px;height:14px;border-radius:2px;background:#6C63FF;}
.card-badge{font-size:11px;color:#6C63FF;background:#f0eeff;padding:2px 8px;border-radius:20px;}
.card-link{font-size:11px;color:#6C63FF;cursor:pointer;border:none;background:none;font-family:inherit;}

/* DONUT */
.donut-wrap{display:flex;align-items:center;gap:16px;}
.donut-canvas-wrap{position:relative;width:140px;height:140px;flex-shrink:0;}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;}
.donut-center-val{font-size:18px;font-weight:700;line-height:1;}
.donut-center-label{font-size:10px;color:#999;margin-top:2px;}
.donut-legend{flex:1;}
.legend-item{display:flex;align-items:center;gap:6px;margin-bottom:7px;font-size:12px;}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.legend-name{color:#333;flex:1;}
.legend-val{color:#999;font-size:11px;white-space:nowrap;}

/* TREND TABLE */
.trend-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;}
.trend-table th{padding:7px 10px;background:#f8f9fc;font-weight:600;color:#666;text-align:center;border-bottom:1px solid #ebebf5;}
.trend-table th:first-child{text-align:left;}
.trend-table td{padding:7px 10px;text-align:center;border-bottom:1px solid #f5f5f8;}
.trend-table td:first-child{text-align:left;font-weight:500;}
.trend-table tr:last-child td{background:#f8f9fc;font-weight:700;border-bottom:none;}
.shin-c{color:#6C63FF;font-weight:600;}
.re-c{color:#22c997;font-weight:600;}
.diff-up{color:#22c997;font-size:11px;}
.diff-dn{color:#FF6B6B;font-size:11px;}

/* STAT ROW */
.stat-row{display:flex;gap:28px;flex-wrap:wrap;}
.stat-item{min-width:100px;}
.stat-label{font-size:11px;color:#999;margin-bottom:5px;}
.stat-val{font-size:24px;font-weight:700;letter-spacing:-0.5px;cursor:default;}
.stat-unit{font-size:12px;color:#aaa;margin-left:2px;}
.stat-pct{display:inline-block;margin-left:6px;font-size:11px;padding:1px 6px;border-radius:10px;}

/* INSIGHT */
.insight-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-top:16px;}
.insight-card{background:#fff;border-radius:12px;padding:14px 16px;border:1px solid #ebebf5;}
.insight-icon{font-size:20px;margin-bottom:6px;}
.insight-title{font-size:12px;font-weight:600;margin-bottom:4px;}
.insight-desc{font-size:11px;color:#888;line-height:1.5;}

/* GAUGE */
.gauge-wrap{position:relative;width:80px;height:80px;margin:0 auto 8px;}
.gauge-wrap canvas{width:80px!important;height:80px!important;}
.gauge-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-45%);text-align:center;font-size:13px;font-weight:700;}

/* BOTTOM ROW */
.bottom-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}

/* TREND POPUP */
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:none;align-items:center;justify-content:center;}
.popup-overlay.show{display:flex;}
.popup-box{background:#fff;border-radius:18px;padding:24px;width:92%;max-width:800px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
.popup-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.popup-title{font-size:15px;font-weight:700;}
.popup-close{background:none;border:none;font-size:20px;cursor:pointer;color:#aaa;}
.cal-toggle-btn{width:100%;text-align:center;font-size:13px;font-weight:600;color:#6C63FF;margin-bottom:8px;padding:9px;background:#f0eeff;border-radius:10px;cursor:pointer;border:none;font-family:inherit;}
.cal-wrap{display:none;gap:16px;flex-wrap:wrap;margin-bottom:14px;padding:14px;background:#f8f9fc;border-radius:10px;border:1px solid #e8e8f0;}
.cal-wrap.open{display:flex;}
.cal-box{flex:1;min-width:190px;}
.cal-box-title{font-size:11px;color:#999;margin-bottom:6px;font-weight:500;}
.cal-year-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.cal-year-btn{background:none;border:none;font-size:15px;cursor:pointer;color:#aaa;padding:0 4px;}
.cal-year-btn:hover{color:#6C63FF;}
.cal-year-label{font-size:13px;font-weight:700;}
.cal-months{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;}
.cal-month-btn{padding:5px 2px;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer;border:1px solid #e8e8f0;background:#fff;color:#555;text-align:center;}
.cal-month-btn:hover{border-color:#6C63FF;color:#6C63FF;}
.cal-month-btn.selected{background:#6C63FF;color:#fff;border-color:#6C63FF;}
.trend-chart-wrap{position:relative;height:200px;margin-bottom:16px;}
.series-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.series-chip{padding:5px 12px;border-radius:50px;font-size:12px;font-family:inherit;cursor:pointer;border:1.5px solid #e0e0ee;background:#fff;color:#888;transition:all 0.15s;}
.series-chip:hover{border-color:#6C63FF;color:#6C63FF;}
.series-chip.active{background:#6C63FF;color:#fff;border-color:#6C63FF;}
.series-chip.all-chip.active{background:#1c1c2e;border-color:#1c1c2e;}

/* 기타 */
.chart-wrap{position:relative;height:180px;}
.empty{color:#ccc;font-size:13px;text-align:center;padding:30px;}
.tooltip-wrap{cursor:default;}
.custom-tooltip{position:fixed;background:#1c1c2e;color:#fff;font-size:12px;line-height:1.8;padding:8px 14px;border-radius:10px;pointer-events:none;white-space:pre;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.2);}

/* 누적현황 기간 선택 패널 */
.accum-panel{background:#f8f9fc;border:1px solid #e8e8f0;border-radius:12px;padding:14px 18px;margin-bottom:16px;display:none;}
.accum-panel.show{display:block;}
.accum-panel-title{font-size:12px;color:#888;margin-bottom:10px;}
.accum-btns{display:flex;gap:8px;flex-wrap:wrap;}
.accum-btn{padding:6px 16px;border-radius:50px;font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;border:1.5px solid #e0e0ee;background:#fff;color:#888;transition:all 0.2s;}
.accum-btn:hover{border-color:#6C63FF;color:#6C63FF;}
.accum-btn.active{background:#6C63FF;color:#fff;border-color:#6C63FF;}

/* P2 판매채널 */
.seller-filter-wrap{display:none;margin-bottom:14px;}
.seller-filter-wrap.show{display:block;}

@media(max-width:1000px){
  .summary-row{grid-template-columns:1fr 1fr;}
  .main-grid,.main-grid.wide{grid-template-columns:1fr;}
  .bottom-row{grid-template-columns:1fr;}
  .insight-row{grid-template-columns:repeat(2,1fr);}
  main{padding:16px 14px 40px;}
  .topbar,.period-bar,.sheet-tabs,.connect-bar{padding-left:14px;padding-right:14px;}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<!-- 로딩 팝업 -->
<div id="loadingPopup" style="position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:500;display:flex;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:20px;padding:36px 48px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.2);">
    <div style="font-size:36px;margin-bottom:16px;">📊</div>
    <div style="font-size:16px;font-weight:700;color:#1c1c2e;margin-bottom:8px;">데이터를 불러오는 중이에요</div>
    <div style="font-size:13px;color:#aaa;">잠시만 기다려 주세요!</div>
    <div style="margin-top:20px;display:flex;justify-content:center;gap:6px;">
      <div style="width:8px;height:8px;border-radius:50%;background:#6C63FF;animation:bounce 1s infinite 0s;"></div>
      <div style="width:8px;height:8px;border-radius:50%;background:#6C63FF;animation:bounce 1s infinite 0.2s;"></div>
      <div style="width:8px;height:8px;border-radius:50%;background:#6C63FF;animation:bounce 1s infinite 0.4s;"></div>
    </div>
  </div>
</div>
<style>
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
</style>

<div class="topbar">
  <div class="topbar-left">
    <span class="app-title">판매지원팀 판매현황</span>
  </div>
  <div class="topbar-right" style="display:flex;align-items:center;gap:14px;">
    <span class="last-update" id="lastUpdate" style="display:none;"></span>
    <button onclick="openNotice()" style="padding:6px 14px;border-radius:8px;font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;border:1.5px solid #6C63FF;background:#fff;color:#6C63FF;white-space:nowrap;">📢 공지 / 요청사항</button>
  </div>
</div>

<!-- CONNECT -->
<div class="connect-bar" style="display:none;">
  <label>시트 ID</label>
  <input id="sheetId" value="14j3hDW3Hn-1ftkJlqZhEZhWTt38eZU8S4yMoadenrR4"/>
  <button class="btn-load" onclick="loadAll()">불러오기</button>
  <span id="statusMsg"></span>
</div>
<!-- 실행/탁송 버튼 (period-bar 옆에) -->
<div id="dataModeBtns" style="display:none;padding:8px 28px;background:#fff;border-bottom:1px solid #e8e8f0;">
  <div style="display:flex;background:#f0f0f8;border-radius:8px;padding:3px;gap:2px;width:fit-content;">
    <button onclick="setDataMode('exec')" id="btn_exec"
      style="padding:5px 16px;border-radius:6px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;border:none;background:#6C63FF;color:#fff;transition:all 0.15s;">실행</button>
    <button onclick="setDataMode('takso')" id="btn_takso"
      style="padding:5px 16px;border-radius:6px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;border:none;background:transparent;color:#888;transition:all 0.15s;">탁송</button>
  </div>
</div>

<!-- PERIOD BAR -->
<div class="period-bar" id="periodBar">
  <div class="period-seg">
    <button class="seg-btn active" onclick="setMode('month')" id="seg_month">월별</button>
    <button class="seg-btn" onclick="setMode('year')" id="seg_year">년도별</button>
  </div>
  <div class="period-sep"></div>
  <select class="period-sel" id="yearSel" onchange="onYearChange()"><option value="">년도</option></select>
  <select class="period-sel" id="monthSel" onchange="renderCurrent()"><option value="">월</option></select>
</div>



<!-- SHEET TABS -->
<div class="sheet-tabs" id="sheetTabs">
  <button class="sheet-tab active" onclick="switchTab(0)" id="tab0">상품별 현황</button>
  <button class="sheet-tab" onclick="switchTab(1)" id="tab1">차종별 현황</button>
  <button class="sheet-tab" onclick="switchTab(2)" id="tab2">판매채널별 현황</button>
  <button class="sheet-tab" onclick="switchTab(3)" id="tab3">수행자별 현황</button>
</div>

<!-- 공지 팝업 -->
<div id="noticePopup" style="position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:300;display:none;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:18px;padding:28px;width:92%;max-width:520px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2);">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <span style="font-size:16px;font-weight:700;">📢 공지 / 요청사항</span>
      <button onclick="closeNotice()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#aaa;">×</button>
    </div>

    <!-- 공지사항 -->
    <div style="margin-bottom:20px;">
      <div style="font-size:13px;font-weight:600;color:#6C63FF;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #f0eeff;">📌 공지사항</div>
      <div style="font-size:13px;color:#555;line-height:1.8;background:#f8f9fc;border-radius:10px;padding:14px;">
        • 데이터는 매일 수동 업데이트됩니다.<br>
        • 탁송 데이터는 희망출고일 기준입니다.<br>
        • 문의사항은 아래 요청란에 남겨주세요!
      </div>
    </div>

    <!-- 요청사항 입력 -->
    <div>
      <div style="font-size:13px;font-weight:600;color:#6C63FF;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #f0eeff;">✏️ 요청사항</div>
      <input type="text" id="noticeNameInput" placeholder="이름 (예: 홍길동)" 
        style="width:100%;padding:10px 12px;font-size:13px;font-family:inherit;border:1.5px solid #e8e8f0;border-radius:10px;outline:none;box-sizing:border-box;margin-bottom:8px;"
        onfocus="this.style.borderColor='#6C63FF'" onblur="this.style.borderColor='#e8e8f0'"/>
      <textarea id="noticeInput" placeholder="개선사항이나 요청사항을 남겨주세요 😊" rows="4"
        style="width:100%;padding:12px;font-size:13px;font-family:inherit;border:1.5px solid #e8e8f0;border-radius:10px;resize:none;outline:none;box-sizing:border-box;"
        onfocus="this.style.borderColor='#6C63FF'" onblur="this.style.borderColor='#e8e8f0'"></textarea>
      <div id="noticeList" style="margin-top:12px;max-height:160px;overflow-y:auto;"></div>
      <button onclick="submitNotice()"
        style="margin-top:10px;width:100%;padding:10px;background:#6C63FF;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;">
        등록하기
      </button>
    </div>
  </div>
</div>

<!-- TREND POPUP -->
<div class="popup-overlay" id="trendPopup">
  <div class="popup-box">
    <div class="popup-header">
      <span class="popup-title" id="popupTitle">월별 추세 비교</span>
      <button class="popup-close" onclick="closeTrendPopup()">×</button>
    </div>
    <button class="cal-toggle-btn" id="calToggleBtn" onclick="toggleCal()">📅 기간을 선택하세요 ▼</button>
    <div class="cal-wrap" id="calWrap">
      <div class="cal-box">
        <div class="cal-box-title">시작 월</div>
        <div class="cal-year-row">
          <button class="cal-year-btn" onclick="moveYear('from',-1)">‹</button>
          <span class="cal-year-label" id="fromYearLabel">2025</span>
          <button class="cal-year-btn" onclick="moveYear('from',1)">›</button>

const WORKER_MAP={'이연수':'하모니','이현수':'하모니','백광현':'하모니','양서영':'토스','염대현':'토스','박주영':'토스','주식회사 하렌파트너스':'하렌파트너스'};
function mapWorker(v){const s=(v||'').toString().trim();if(!s)return null;for(const[k,l]of Object.entries(WORKER_MAP))if(s.includes(k))return l;return s.slice(0,3)||null;}

// 탁송 수행자 매핑
function mapTaksoWorker(v){
  const s=(v||'').toString().trim();
  if(!s)return'미확인';
  if(s.includes('특이건'))return'특이건';
  if(s.includes('하렌파트너스')||s.includes('주식회사 하렌'))return'하렌파트너스';
  // 괄호 앞 이름만 (예: 이진희(차드림) → 이진희)
  const m=s.match(/^([^(（]+)/);
  return m?m[1].trim().slice(0,3):s.slice(0,3);
}

const AUTOW_MAP={'카투':{계약수행자:'신선미',원수행자:'신선미'},'오토리지':{계약수행자:'조복경',원수행자:'나장열'},'씨에스카':{계약수행자:'조복경',원수행자:'조복경'},'시현':{계약수행자:'조복경',원수행자:'최형용'},'스윗코':{계약수행자:'조복경',원수행자:'이진희'},'스마트다이렉트카':{계약수행자:'조복경',원수행자:'이종국'},'슈어카':{계약수행자:'조복경',원수행자:'이종국'},'신차드림':{계약수행자:'조복경',원수행자:'이종국'},'오토다이렉트카':{계약수행자:'조복경',원수행자:'이종국'},'카베이':{계약수행자:'강병문',원수행자:'이종국'}};
function getChannelGroup(ch){const s=(ch||'').trim();for(const[k,v]of Object.entries(AUTOW_MAP))if(s.includes(k))return v;return null;}

function setStatus(msg,ok){const el=document.getElementById('statusMsg');el.textContent=msg;el.style.color=ok===false?'#FF6B6B':ok===true?'#22c997':'#999';}

function setDataMode(mode){
  dataMode=mode;

  if(execBtn){execBtn.style.background=mode==='exec'?'#6C63FF':'transparent';execBtn.style.color=mode==='exec'?'#fff':'#888';}
  if(taksoBtn){taksoBtn.style.background=mode==='takso'?'#6C63FF':'transparent';taksoBtn.style.color=mode==='takso'?'#fff':'#888';}

  const sheetTabsEl=document.getElementById('sheetTabs');
  if(sheetTabsEl)sheetTabsEl.style.display=mode==='takso'?'none':'flex';

  const taksoPeriod=document.getElementById('takso_period_bar');
  if(taksoPeriod)taksoPeriod.style.display=mode==='takso'?'flex':'none';

  const mainPeriod=document.getElementById('periodBar');
  if(mainPeriod)mainPeriod.style.display=mode==='takso'?'none':'flex';

  if(mode==='takso'){
    switchTab(0);
    initTaksoPickers();
    renderTakso();
  } else {
    if(mainPeriod)mainPeriod.style.display='flex';
    renderCurrent();
  }
}

function switchTab(idx){
  currentTab=idx;
  [0,1,2,3].forEach(i=>{document.getElementById(`tab${i}`).classList.toggle('active',i===idx);document.getElementById(`panel${i}`).classList.toggle('active',i===idx);});
  // 차종별 탭(1)은 월별/년도별 버튼 숨기고 년도만
  const segEl=document.querySelector('.period-seg');
  const sepEl=document.querySelector('.period-bar .period-sep');
  const monthSel=document.getElementById('monthSel');
  if(idx===1){
    if(segEl)segEl.style.display='none';
    if(sepEl)sepEl.style.display='none';
    if(monthSel)monthSel.style.display='none';
  } else {
    if(segEl)segEl.style.display='flex';
    if(sepEl)sepEl.style.display='block';
    if(monthSel)monthSel.style.display=viewMode==='month'?'inline-block':'none';
  }
  setTimeout(()=>renderCurrent(),30);
}

function setMode(m){
  viewMode=m;
  ['month','year'].forEach(k=>{const el=document.getElementById('seg_'+k);if(el)el.classList.toggle('active',k===m);});
  const mSel=document.getElementById('monthSel');
  if(mSel)mSel.style.display=m==='month'?'inline-block':'none';
  renderCurrent();
}

function onYearChange(){
  const yr=document.getElementById('yearSel').value;
  const mSel=document.getElementById('monthSel');
  if(!mSel)return;
  if(yr&&rawTable){
    const{rows,idx}=getRows();
    const iDate=idx('계약실행일');
    const months=[...new Set(rows.filter(r=>getYM(r[iDate])?.startsWith(yr)).map(r=>getYM(r[iDate])).filter(Boolean))].sort();
    mSel.innerHTML='<option value="">월 선택</option>'+months.map(m=>`<option value="${m}">${parseInt(m.split('.')[1])}월</option>`).join('');
    const tm=thisMonth();
    if(months.includes(tm))mSel.value=tm;
    else mSel.value=months[months.length-1]||'';
  }
  renderCurrent();
}



async function loadAll(){
  const id=document.getElementById('sheetId').value.trim();
  if(!id){setStatus('시트 ID를 입력해주세요.',false);return;}
  setStatus('불러오는 중...',null);
  const url=`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent('판매현황테스트')}`;
  try{
    const res=await fetch(url);const text=await res.text();
    const match=text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
    if(!match)throw new Error('파싱 실패');
    const json=JSON.parse(match[1]);
    if(!json.table?.rows?.length)throw new Error('데이터 없음');
    rawTable=json.table;
    const now=new Date();
    document.getElementById('lastUpdate').textContent=`↻ 최종 업데이트: ${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    // sheetTabs already visible
    // periodBar already visible
    // 탁송 데이터도 함께 로드
    try{
      const tUrl=`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent('탁송데이터')}`;
      const tRes=await fetch(tUrl);
      const tText=await tRes.text();
      const tMatch=tText.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
      if(tMatch){
        const tJson=JSON.parse(tMatch[1]);
        if(tJson.table?.rows?.length){
          rawTaksoTable=tJson.table;
          console.log('탁송 로드 성공:',rawTaksoTable.rows.length,'건');
        }
      } else {
        console.log('탁송 매칭 실패, 응답:', tText.slice(0,200));
      }
    }catch(e){console.log('탁송 로드 실패:',e.message);}

    // 실행/탁송 버튼 표시
    const modeBtns=document.getElementById('dataModeBtns');
    if(modeBtns)modeBtns.style.display='block';

    [0,1,2,3].forEach(i=>setBadge(`tab${i}`,rawTable.rows.length));
    populatePickers();
    renderCurrent();
    setStatus(`✓ ${rawTable.rows.length.toLocaleString()}건`+(rawTaksoTable?` / 탁송 ${rawTaksoTable.rows.length.toLocaleString()}건`:' / 탁송 로드안됨'),true);
    // 로딩 팝업 숨기기
    const loadPopup=document.getElementById('loadingPopup');
    if(loadPopup)loadPopup.style.display='none';
    const lastUpEl=document.getElementById('lastUpdate');
    if(lastUpEl)lastUpEl.style.display='inline';
  }catch(e){
    setStatus('❌ '+e.message,false);console.error(e);
    const loadPopup=document.getElementById('loadingPopup');
    if(loadPopup)loadPopup.style.display='none';
  }
}

function setBadge(id,count){const old=document.getElementById(id).querySelector('.tab-badge');if(old)old.remove();const b=document.createElement('span');b.className='tab-badge';b.textContent=count.toLocaleString()+'건';document.getElementById(id).appendChild(b);}

function getRows(){
  const cols=rawTable.cols.map(c=>c.label);
  const rows=rawTable.rows.map(r=>r.c.map(c=>c?c.v:null));
  const idx=n=>cols.findIndex(c=>c&&c.includes(n));
  return{cols,rows,idx};
}

function getYM(v){
  if(!v)return null;
  const d=v.toString().match(/Date\((\d{4}),(\d+),(\d+)\)/);
  if(d)return`${d[1]}.${String(parseInt(d[2])+1).padStart(2,'0')}`;
  const m=v.toString().match(/(\d{4})[.\-\/](\d{1,2})/);
  return m?`${m[1]}.${m[2].padStart(2,'0')}`:null;
}

function thisMonth(){const n=new Date();return`${n.getFullYear()}.${String(n.getMonth()+1).padStart(2,'0')}`;}

function getFilteredRows(rows,iDate){
  const yr=document.getElementById('yearSel')?.value||new Date().getFullYear().toString();
  const mo=document.getElementById('monthSel')?.value||'';
  if(viewMode==='month'){
    if(mo)return rows.filter(r=>getYM(r[iDate])===mo);
    return rows.filter(r=>getYM(r[iDate])===thisMonth());
  } else {
    return rows.filter(r=>getYM(r[iDate])?.startsWith(yr));
  }
}

function getPeriodLabel(){
  const yr=document.getElementById('yearSel')?.value||new Date().getFullYear().toString();
  const mo=document.getElementById('monthSel')?.value||'';
  if(viewMode==='month'){
    if(mo){const p=mo.split('.');return p[0]+'년 '+parseInt(p[1])+'월';}
    const p=thisMonth().split('.');return p[0]+'년 '+parseInt(p[1])+'월';
  }
  return yr+'년 전체';
}

function getAllMonths(rows,iDate){
  return[...new Set(rows.map(r=>getYM(r[iDate])).filter(Boolean))].sort();
}

function populatePickers(){
  const{rows,idx}=getRows();
  const iDate=idx('계약실행일');
  const years=[...new Set(rows.map(r=>getYM(r[iDate])?.split('.')[0]).filter(Boolean))].sort().reverse();

  // 년도 셀렉터
  const ySel=document.getElementById('yearSel');
  if(ySel){
    ySel.innerHTML=years.map(y=>`<option value="${y}">${y}년</option>`).join('');
    const thisY=new Date().getFullYear().toString();
    if(years.includes(thisY))ySel.value=thisY;
  }

  // 달력 기본값: 최근 1년
  const now=new Date();
  calFrom={year:now.getFullYear()-1,month:now.getMonth()+1};
  calTo={year:now.getFullYear(),month:now.getMonth()+1};

  // 월 셀렉터 초기화 (현재 년도 월 목록 + 현재달 선택)
  onYearChange();
}


function countMap(arr,keyFn){const m={};arr.forEach(r=>{const v=keyFn(r);if(v!=null&&v!==''){m[v]=(m[v]||0)+1;}});return m;}
function avgVal(arr,iR){
  if(iR<0||!arr.length)return'-';
  const v=arr.map(r=>parseFloat((r[iR]||'').toString().replace(/[^0-9.-]/g,''))).filter(v=>!isNaN(v)&&v>0);
  if(!v.length)return'-';
  return Math.round(v.reduce((a,b)=>a+b,0)/v.length).toLocaleString()+'원';
}

function toggleTrendTable(){
  const w=document.getElementById('trendTableWrap2');
  const btn=document.getElementById('trendTableToggle');
  if(!w)return;
  const show=w.style.display==='none';
  w.style.display=show?'block':'none';
  if(btn)btn.textContent=show?'▲ 숨기기':'▼ 상세';
}

function renderCurrent(){
  if(!rawTable)return;
  if(dataMode==='takso'){renderTakso();return;}
  if(currentTab===0)renderP0();
  else if(currentTab===1)renderP1();
  else if(currentTab===2)renderP2();
  else renderP3();
}

// ===================== P0: 상품별 현황 =====================
function renderP0(){
  if(!rawTable)return;
  const{rows,idx}=getRows();
  const iDate=idx('계약실행일'),iProd=idx('상품구분'),iType=idx('상품유형');
  const iNoDepo=idx('무보증여부'),iEnd=idx('종료후처리'),iWorker=idx('수행원');
  const iAge=idx('계약 당시 연령대'),iRental=idx('렌탈료');

  const filtered=getFilteredRows(rows,iDate);
  const shincha=filtered.filter(r=>(r[iProd]||'').includes('신차'));
  const rerent=filtered.filter(r=>{const v=(r[iProd]||'');return v.includes('재렌트')||v.includes('재');});

  // 전년 동기 비교
  const prevYearRows=getPrevYearRows(rows,iDate);
  const prevShin=prevYearRows.filter(r=>(r[iProd]||'').includes('신차')).length;
  const prevRe=prevYearRows.filter(r=>{const v=(r[iProd]||'');return v.includes('재렌트')||v.includes('재');}).length;
  const prevTotal=prevYearRows.length;

  function calcPctGlobal(curr,prev){if(!prev)return null;return((curr-prev)/prev*100).toFixed(1);}
  function pctBadge(curr,prev){const p=calcPctGlobal(curr,prev);if(p===null)return'';const up=parseFloat(p)>=0;return`<span class="stat-pct" style="background:${up?'#e8f8f0':'#fde8e8'};color:${up?'#1a7a4a':'#a32d2d'};">${up?'▲':'▼'} ${Math.abs(p)}%</span>`;}

  // 월별 추세 (최근 6개월)
  const allMonths=getAllMonths(rows,iDate);
  const recentMonths=allMonths.slice(-6);
  const shinByM={},reByM={};
  recentMonths.forEach(m=>{shinByM[m]=0;reByM[m]=0;});
  rows.forEach(r=>{const m=getYM(r[iDate]);if(!m||!shinByM.hasOwnProperty(m))return;if((r[iProd]||'').includes('신차'))shinByM[m]++;else if((r[iProd]||'').includes('재렌트')||(r[iProd]||'').includes('재'))reByM[m]++;});

  // 무보증
  const isNoDepo=v=>(v||'').toString().trim()==='Y';
  const shinND=shincha.filter(r=>isNoDepo(r[iNoDepo]));
  const reND=rerent.filter(r=>isNoDepo(r[iNoDepo]));
  const shinNDpct=shincha.length?Math.round(shinND.length/shincha.length*100):0;
  const reNDpct=rerent.length?Math.round(reND.length/rerent.length*100):0;

  // 만기처리
  const isSelect=v=>{const s=(v||'').toString().trim();return['반납','반납/연장/인수','양도/반납'].includes(s);};
  const isInsu=v=>(v||'').toString().trim()==='양도(인수)';
  const insuRows=filtered.filter(r=>isInsu(r[iEnd]));
  const selectRows=filtered.filter(r=>isSelect(r[iEnd]));
  const dongbanInsu=insuRows.filter(r=>(r[iType]||'').includes('동반차')).length;
  const gudokInsu=insuRows.filter(r=>(r[iType]||'').includes('구독')).length;

  // 상품유형 도넛 데이터
  const shinTypeMap=countMap(shincha,r=>(r[iType]||'기타').toString().trim());
  const reTypeMap=countMap(rerent,r=>(r[iType]||'기타').toString().trim());

  // 인사이트
  const insights=buildInsights(filtered,shincha,rerent,prevTotal,prevShin,prevRe,shinTypeMap,reTypeMap);

  document.getElementById('p0_content').innerHTML=`
    <!-- 요약 카드 -->
    <div class="summary-row">
      <div class="sum-card">
        <div class="sum-label">전체 계약</div>
        <div class="sum-value" style="color:#1c1c2e;">${filtered.length.toLocaleString()}<span style="font-size:16px;font-weight:500;color:#aaa;"> 건</span></div>
        <div class="sum-sub">${pctBadge(filtered.length,prevTotal)} <span style="color:#bbb;font-size:11px;">전년 동기 대비</span></div>
      </div>
      <div class="sum-card">

function buildAgeTip(arr,iAge){
  if(!arr.length||iAge<0)return'';
  const m=countMap(arr,r=>(r[iAge]||'미확인').toString().trim());
  return Object.entries(m).sort((a,b)=>a[0].localeCompare(b[0])).map(([k,v])=>`${k}  ${v}건`).join('\n');
}

function buildInsights(filtered,shincha,rerent,prevTotal,prevShin,prevRe,shinTypeMap,reTypeMap){
  const ins=[];
  const cp=(c,p)=>p?((c-p)/p*100).toFixed(1):null;

  const tp=cp(filtered.length,prevTotal);
  if(tp!==null) ins.push({icon:parseFloat(tp)>=0?'📈':'📉',color:parseFloat(tp)>=0?'#22c997':'#FF6B6B',
    title:`전체 계약 ${parseFloat(tp)>=0?'증가':'감소'}`,
    desc:`전년 대비 ${Math.abs(tp)}% ${parseFloat(tp)>=0?'증가하며':'감소하며'} 지속적인 ${parseFloat(tp)>=0?'성장세':'하락세'}를 보이고 있습니다.`});

  const shinPct=filtered.length?Math.round(shincha.length/filtered.length*100):0;
  const prevShinPct=prevTotal?Math.round(prevShin/prevTotal*100):0;
  ins.push({icon:'🚗',color:'#6C63FF',
    title:`신차 비중 ${shinPct>=50?'강세':'약세'}`,
    desc:`신차 비중이 ${shinPct}%로, 전년 동기 대비 ${(shinPct-prevShinPct).toFixed(1)}%p 변동했습니다.`});

  const rp=cp(rerent.length,prevRe);
  if(rp!==null) ins.push({icon:'🔄',color:'#22c997',
    title:`재렌트 ${parseFloat(rp)>=0?'성장세':'감소세'}`,
    desc:`재렌트 계약이 전년 대비 ${Math.abs(rp)}% ${parseFloat(rp)>=0?'증가':'감소'}했습니다.`});

  const topShin=Object.entries(shinTypeMap).sort((a,b)=>b[1]-a[1])[0];
  if(topShin) ins.push({icon:'⭐',color:'#FFA94D',
    title:`신차 TOP: ${topShin[0]}`,
    desc:`${topShin[0]} 상품이 신차 중 가장 높은 비중(${Math.round(topShin[1]/shincha.length*100)}%)을 차지합니다.`});

  const topRe=Object.entries(reTypeMap).sort((a,b)=>b[1]-a[1])[0];
  if(topRe) ins.push({icon:'💡',color:'#4dabf7',
    title:`재렌트 TOP: ${topRe[0]}`,
    desc:`${topRe[0]} 상품이 재렌트 중 가장 높은 비중(${Math.round(topRe[1]/rerent.length*100)}%)을 차지합니다.`});

  return ins.slice(0,5);
}


function getPrevYearRows(rows,iDate){
  const curY=document.getElementById('yearSel')?.value||new Date().getFullYear().toString();
  const prevY=String(parseInt(curY)-1);
  const mo=document.getElementById('monthSel')?.value||'';
  if(viewMode==='month'&&mo){
    const pm=prevY+'.'+mo.split('.')[1];
    return rows.filter(r=>getYM(r[iDate])===pm);
  }
  return rows.filter(r=>getYM(r[iDate])?.startsWith(prevY));
}

function extractTrim(modelName){
  if(!modelName)return'기타';
  const s=modelName.toString().trim();

  // 캡 타입 (포터/봉고)
  const capMatch=s.match(/(슈퍼캡|더블캡|싱글캡)/);
  const capType=capMatch?capMatch[1]:null;

  const exclude=['가솔린','디젤','LPG','하이브리드','전기','터보','가스','수소','천연','그래비티'];

  // 트림 키워드 우선 매칭
  const trimKeywords=[
    '더 에센셜','디 에센셜','디에센셜',
    '캘리그라피','노블레스',
    '스마트 플러스','스마트플러스',
    '프리미엄 플러스','프리미엄',
    '익스클루시브','프레스티지','시그니처','트렌디',
    '스마트','모던','스타일',
    '인스퍼레이션','익스프레스','어드밴스드',
    '투어링','르블랑','퍼스트','하이라이프',
    '스탠다드','베이직','라이트','엔트리',
    'N Line','N 라인',
  ];
  let trimName='';
  for(const kw of trimKeywords){if(s.includes(kw)){trimName=kw;break;}}

  // 못 찾으면 2WD/4WD 앞 한글 단어
  if(!trimName){
    const m=s.match(/([가-힣]{2,6})\s+(?:2WD|4WD|AWD)/);
    if(m&&!exclude.includes(m[1]))trimName=m[1];
  }

  // 그래도 못 찾으면 괄호 뒤 첫 한글 단어
  if(!trimName){
    const m=s.match(/\)\s*([가-힣]{2,6})/);
    if(m&&!exclude.includes(m[1]))trimName=m[1];
  }

  if(capType&&trimName)return capType+' - '+trimName;
  if(capType)return capType;
  if(trimName)return trimName;
  return'기타';
}

        },
        scales:{
          x:{grid:{display:false},border:{display:false},ticks:{font:{size:12}}},
          y:{grid:{color:'#f0f0f8'},border:{display:false},ticks:{font:{size:11}},beginAtZero:true,grace:'15%'}
        },
        onClick:(e,els)=>{
          if(els.length>0){
            const mi=months[els[0].index];
            // 전체 모드에서 신차/재렌트 구분 클릭
            if(isAll){
              const di=els[0].datasetIndex; // 0=신차, 1=재렌트
              p1ClickedMonth=p1ClickedMonth===mi&&p1ClickedDetail===(di===0?'shin':'re')?null:mi;
              p1ClickedDetail=di===0?'shin':'re';
            } else {
              p1ClickedMonth=p1ClickedMonth===mi?null:mi;
              p1ClickedDetail=p1CarMode;
            }
            renderP1();
          }
        }
      }
    });

    // 막대 위 숫자: animation 완료 후 그리기
    charts['p1_month'].options.animation={
      onComplete:function(){
        const c=this;const ctx=c.ctx;
        c.data.datasets.forEach((ds,di)=>{
          const meta=c.getDatasetMeta(di);
          if(meta.hidden)return;
          meta.data.forEach((bar,i)=>{
            const val=ds.data[i];
            if(!val)return;
            ctx.save();
            ctx.font='bold 11px sans-serif';
            ctx.fillStyle='#333';
            ctx.textAlign='center';
            ctx.textBaseline='bottom';
            ctx.fillText(val,bar.x,bar.y-4);
            ctx.restore();
          });
        });
      },
      onProgress:function(){
        const c=this;const ctx=c.ctx;
        c.data.datasets.forEach((ds,di)=>{
          const meta=c.getDatasetMeta(di);
          if(meta.hidden)return;
          meta.data.forEach((bar,i)=>{
            const val=ds.data[i];
            if(!val)return;
            ctx.save();
            ctx.font='bold 11px sans-serif';
            ctx.fillStyle='#333';
            ctx.textAlign='center';
            ctx.textBaseline='bottom';
            ctx.fillText(val,bar.x,bar.y-4);
            ctx.restore();
          });
        });
      }
    };
    charts['p1_month'].update();
  }
}

function renderP1DetailBarHTML(dataMap){
  const entries=Object.entries(dataMap).sort((a,b)=>b[1]-a[1]).slice(0,12);
  const total=entries.reduce((s,[,v])=>s+v,0);
  const maxVal=entries[0]?.[1]||1;
  if(!entries.length)return'<div class="empty">데이터 없음</div>';
  return entries.map(([k,v],i)=>`
    <div style="margin-bottom:12px;display:flex;align-items:center;gap:10px;">
      <div style="width:130px;font-size:12px;color:#555;text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${k}</div>
      <div style="flex:1;background:#f3f3f8;border-radius:5px;height:22px;overflow:hidden;">
        <div style="height:100%;border-radius:5px;background:${COLORS[i%COLORS.length]};width:${Math.round(v/maxVal*100)}%;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;min-width:28px;">
          <span style="font-size:11px;color:#fff;font-weight:600;">${v}</span>
        </div>
      </div>
      <div style="width:36px;font-size:12px;color:#aaa;text-align:right;">${Math.round(v/total*100)}%</div>
    </div>`).join('');
}

// ===================== TREND POPUP =====================
const MONTHS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
function openTrendPopup(){
  popupTabCtx=currentTab;
  document.getElementById('trendPopup').classList.add('show');
  document.getElementById('popupTitle').textContent=currentTab===0?'상품별 월별 추세':'차량별 월별 추세';
  document.getElementById('seriesFilterWrap').style.display=currentTab===1?'block':'none';
  if(currentTab===1)buildSeriesChips();
  renderCal();applyRange();
  const w=document.getElementById('calWrap');if(w)w.classList.remove('open');
  updateRangeDisplay();
}
function closeTrendPopup(){document.getElementById('trendPopup').classList.remove('show');}
document.getElementById('trendPopup').addEventListener('click',e=>{if(e.target===document.getElementById('trendPopup'))closeTrendPopup();});
function toggleCal(){document.getElementById('calWrap').classList.toggle('open');updateRangeDisplay();}
function moveYear(side,dir){if(side==='from')calFrom.year+=dir;else calTo.year+=dir;renderCal();}
function renderCal(){
  renderCalSide('from',calFrom,document.getElementById('fromYearLabel'),document.getElementById('fromMonths'));
  renderCalSide('to',calTo,document.getElementById('toYearLabel'),document.getElementById('toMonths'));
  updateRangeDisplay();
}
function renderCalSide(side,state,yearEl,monthsEl){
  if(!yearEl||!monthsEl)return;
  yearEl.textContent=state.year+'년';
  monthsEl.innerHTML=MONTHS.map((l,i)=>{const m=i+1;const sel=state.month===m;return`<button class="cal-month-btn${sel?' selected':''}" onclick="selectMonth('${side}',${m})">${l}</button>`;}).join('');
}
function selectMonth(side,m){
  if(side==='from')calFrom.month=m;else calTo.month=m;
  renderCal();
  if(calFrom.month&&calTo.month){applyRange();const w=document.getElementById('calWrap');if(w)w.classList.remove('open');updateRangeDisplay();}
}
function updateRangeDisplay(){
  const btn=document.getElementById('calToggleBtn');if(!btn)return;
  const f=calFrom.month?`${calFrom.year}년 ${calFrom.month}월`:'시작월';
  const t=calTo.month?`${calTo.year}년 ${calTo.month}월`:'종료월';
  const arrow=document.getElementById('calWrap')?.classList.contains('open')?'▲':'▼';
  btn.textContent=`📅 ${f}  ~  ${t}  ${arrow}`;
}
function buildSeriesChips(){
  const{rows,idx}=getRows();const iSeries=idx('시리즈명');
  const all=new Set();rows.forEach(r=>{const v=(r[iSeries]||'').toString().trim();if(v)all.add(v);});
  const wrap=document.getElementById('seriesFilterChips');
  wrap.innerHTML=`<button class="series-chip all-chip active" onclick="toggleSeries('__all__')">전체</button>`+[...all].sort().map(s=>`<button class="series-chip" onclick="toggleSeries('${s}')" id="chip_${CSS.escape(s)}">${s}</button>`).join('');
  selectedSeries=new Set(['__all__']);
}
function toggleSeries(s){
  if(s==='__all__'){selectedSeries=new Set(['__all__']);document.querySelectorAll('.series-chip').forEach(el=>el.classList.remove('active'));document.querySelector('.all-chip').classList.add('active');}
  else{selectedSeries.delete('__all__');document.querySelector('.all-chip')?.classList.remove('active');if(selectedSeries.has(s)){selectedSeries.delete(s);document.getElementById(`chip_${CSS.escape(s)}`)?.classList.remove('active');}else{selectedSeries.add(s);document.getElementById(`chip_${CSS.escape(s)}`)?.classList.add('active');}if(selectedSeries.size===0){selectedSeries.add('__all__');document.querySelector('.all-chip')?.classList.add('active');}}
  applyRange();
}
function applyRange(){
  if(!rawTable)return;
  if(!calFrom.month||!calTo.month)return;
  const from=`${calFrom.year}.${String(calFrom.month).padStart(2,'0')}`;
  const to=`${calTo.year}.${String(calTo.month).padStart(2,'0')}`;
  if(from>to)return;
  const{rows,idx}=getRows();
  const iDate=idx('계약실행일'),iProd=idx('상품구분'),iSeries=idx('시리즈명');
  const allMonths=getAllMonths(rows,iDate).filter(m=>m>=from&&m<=to);
  let filtered=rows;
  if(popupTabCtx===1&&!selectedSeries.has('__all__'))filtered=rows.filter(r=>selectedSeries.has((r[iSeries]||'').toString().trim()));
  const shinMap={},reMap={},totMap={};
  allMonths.forEach(m=>{shinMap[m]=0;reMap[m]=0;totMap[m]=0;});
  filtered.forEach(r=>{
    const m=getYM(r[iDate]);if(!m||m<from||m>to)return;
    const prod=(r[iProd]||'');
    totMap[m]=(totMap[m]||0)+1;
    if(prod.includes('신차'))shinMap[m]=(shinMap[m]||0)+1;
    else if(prod.includes('재렌트')||prod.includes('재'))reMap[m]=(reMap[m]||0)+1;
  });
  const tShin=allMonths.reduce((a,m)=>a+(shinMap[m]||0),0);
  const tRe=allMonths.reduce((a,m)=>a+(reMap[m]||0),0);
  const tTot=allMonths.reduce((a,m)=>a+(totMap[m]||0),0);
  const canvas=document.getElementById('trendLineChart');
  if(canvas){if(charts['trendLine'])charts['trendLine'].destroy();
    charts['trendLine']=new Chart(canvas.getContext('2d'),{type:'line',data:{labels:allMonths,datasets:[{label:'신차',data:allMonths.map(m=>shinMap[m]||0),borderColor:'#6C63FF',backgroundColor:'rgba(108,99,255,0.08)',tension:0.4,pointRadius:4,fill:true},{label:'재렌트',data:allMonths.map(m=>reMap[m]||0),borderColor:'#22c997',backgroundColor:'rgba(34,201,151,0.06)',tension:0.4,pointRadius:4,fill:true},{label:'총 출고',data:allMonths.map(m=>totMap[m]||0),borderColor:'#FF6B6B',tension:0.4,pointRadius:4,borderDash:[5,3],fill:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11},usePointStyle:true}}},scales:{x:{grid:{display:false},border:{display:false},ticks:{font:{size:10}}},y:{grid:{color:'#f0f0f8'},border:{display:false},ticks:{font:{size:10}},beginAtZero:true}}}});
  }
  const tw=document.getElementById('trendTableWrap');
  if(tw)tw.innerHTML=`<table class="trend-table"><thead><tr><th>월</th><th>신차</th><th>재렌트</th><th>총 출고</th></tr></thead><tbody>${allMonths.map(m=>`<tr><td>${m}</td><td class="shin-c">${shinMap[m]||0}</td><td class="re-c">${reMap[m]||0}</td><td style="font-weight:600;">${totMap[m]||0}</td></tr>`).join('')}<tr><td>합계</td><td class="shin-c">${tShin}</td><td class="re-c">${tRe}</td><td style="font-weight:700;">${tTot}</td></tr></tbody></table>`;
}

function initTaksoPickers(){
  if(!rawTaksoTable)return;
  const cols=rawTaksoTable.cols.map(c=>c.label);
  const rows=rawTaksoTable.rows.map(r=>r.c.map(c=>c?c.v:null));
  const iHope=cols.findIndex(c=>c&&(c.includes('희망일자')||c.includes('희망')));
  const iDateFallback=cols.findIndex(c=>c&&c.includes('요청일시'));
  const iDF=iHope>=0?iHope:iDateFallback;
  const years=[...new Set(rows.map(r=>getYM(r[iDF])?.split('.')[0]).filter(Boolean))].sort().reverse();
  const ySel=document.getElementById('takso_year_sel');
  if(!ySel)return;
  const thisY=new Date().getFullYear().toString();
  ySel.innerHTML=years.map(y=>`<option value="${y}">${y}년</option>`).join('');
  if(years.includes(thisY))ySel.value=thisY;
  onTaksoYearChange(true); // true = 현재달 자동 선택
}

function onTaksoYearChange(selectCurrent){
  if(!rawTaksoTable)return;
  const yr=document.getElementById('takso_year_sel')?.value||new Date().getFullYear().toString();
  const cols=rawTaksoTable.cols.map(c=>c.label);
  const rows=rawTaksoTable.rows.map(r=>r.c.map(c=>c?c.v:null));
  const iHope=cols.findIndex(c=>c&&(c.includes('희망일자')||c.includes('희망')));
  const iDF=iHope>=0?iHope:cols.findIndex(c=>c&&c.includes('요청일시'));
  const months=[...new Set(rows.filter(r=>getYM(r[iDF])?.startsWith(yr)).map(r=>getYM(r[iDF])).filter(Boolean))].sort();
  const mSel=document.getElementById('takso_month_sel');
  if(!mSel)return;
  mSel.innerHTML='<option value="">전체</option>'+months.map(m=>`<option value="${m}">${parseInt(m.split('.')[1])}월</option>`).join('');
  if(selectCurrent){
    const tm=thisMonth();
    if(months.includes(tm))mSel.value=tm;
    else mSel.value=months[months.length-1]||'';
  }
  renderTakso();
}

          style="width:100%;margin-top:10px;padding:7px;border:1px solid #e0e0ee;border-radius:8px;background:#f8f9fc;font-size:12px;font-family:inherit;cursor:pointer;color:#666;">
          ▼ 전체 보기
        </button>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">재렌트 차종별</span><span class="card-badge">${rerent.length}건</span></div>
        <div id="t_re_car_bar"></div>
        <button onclick="toggleTaksoCarDetail('re')" id="takso_car_toggle_re"
          style="width:100%;margin-top:10px;padding:7px;border:1px solid #e0e0ee;border-radius:8px;background:#f8f9fc;font-size:12px;font-family:inherit;cursor:pointer;color:#666;">
          ▼ 전체 보기
        </button>
      </div>
    </div>`;

  renderDonut('t_donut_prod_all','t_legend_prod_all',prodMap);
  renderDonut('t_donut_prod_shin','t_legend_prod_shin',shinProdMap);
  renderDonut('t_donut_prod_re','t_legend_prod_re',reProdMap);
  renderDonut('t_donut_worker','t_legend_worker',workerMap);

  // 차종별 기본 상위 8개
  renderBar('t_car_bar',carMap,8);
  renderBar('t_shin_car_bar',shinCarMap,8);
  renderBar('t_re_car_bar',reCarMap,8);
  // 전체보기용 저장
  window._taksoCarMap=carMap;
  window._taksoShinCarMap=shinCarMap;
  window._taksoReCarMap=reCarMap;
}

function toggleTaksoWorkerDetail(){
  const el=document.getElementById('takso_worker_detail');
  const btn=document.getElementById('takso_worker_toggle');
  if(!el)return;
  const show=el.style.display==='none';
  el.style.display=show?'block':'none';
  if(btn)btn.textContent=show?'▲ 수행자별 상세 접기':'▼ 수행자별 상세 보기';
}

function toggleTaksoCarDetail(type){
  const barId=type==='all'?'t_car_bar':type==='shin'?'t_shin_car_bar':'t_re_car_bar';
  const btnId=type==='all'?'takso_car_toggle_all':type==='shin'?'takso_car_toggle_shin':'takso_car_toggle_re';
  const dataMap=type==='all'?window._taksoCarMap:type==='shin'?window._taksoShinCarMap:window._taksoReCarMap;
  const btn=document.getElementById(btnId);
  // 토글 상태 확인 (data-expanded 속성)
  const expanded=btn&&btn.getAttribute('data-expanded')==='true';
  if(expanded){
    // 접기 - 상위 8개만
    renderBar(barId,dataMap||{},8);
    if(btn){btn.textContent='▼ 전체 보기';btn.setAttribute('data-expanded','false');}
  } else {
    // 전체 보기 - limit 999
    renderBar(barId,dataMap||{},999);
    if(btn){btn.textContent='▲ 접기';btn.setAttribute('data-expanded','true');}
  }
}


// ===================== 공통 렌더 함수 =====================
function renderDonut(canvasId,legendId,dataMap){
  const entries=Object.entries(dataMap).sort((a,b)=>b[1]-a[1]);
  const total=entries.reduce((s,[,v])=>s+v,0);
  const canvas=document.getElementById(canvasId);const legendEl=document.getElementById(legendId);
  if(!canvas||!legendEl)return;
  if(!entries.length){canvas.parentElement.innerHTML='<div class="empty">데이터 없음</div>';return;}
  if(charts[canvasId])charts[canvasId].destroy();
  charts[canvasId]=new Chart(canvas.getContext('2d'),{type:'doughnut',data:{labels:entries.map(([k])=>k),datasets:[{data:entries.map(([,v])=>v),backgroundColor:COLORS,borderWidth:2,borderColor:'#fff',hoverOffset:6}]},options:{cutout:'68%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${ctx.raw}건 (${Math.round(ctx.raw/total*100)}%)`}}},animation:{animateRotate:true,duration:700}}});
  legendEl.innerHTML=entries.slice(0,7).map(([k,v],i)=>`<div class="legend-item"><div class="legend-dot" style="background:${COLORS[i%COLORS.length]}"></div><span class="legend-name">${k}</span><span class="legend-val">${v}건 · ${Math.round(v/total*100)}%</span></div>`).join('');
}
function renderBar(elId,dataMap,limit=7){
  const el=document.getElementById(elId);if(!el)return;
  const allEntries=Object.entries(dataMap).sort((a,b)=>b[1]-a[1]);
  const totalAll=allEntries.reduce((s,[,v])=>s+v,0); // 전체 합계 기준
  const entries=allEntries.slice(0,limit);
  if(!entries.length){el.innerHTML='<div class="empty">데이터 없음</div>';return;}
  el.innerHTML=entries.map(([k,v],i)=>`<div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px;"><span>${k}</span><span style="color:#999;">${v.toLocaleString()}건 · ${Math.round(v/totalAll*100)}%</span></div><div style="background:#f3f3f8;border-radius:5px;height:6px;overflow:hidden;"><div style="height:100%;border-radius:5px;background:${COLORS[i%COLORS.length]};width:${Math.round(v/totalAll*100)}%;"></div></div></div>`).join('');
}
function renderWorkerBars(elId,totalMap,shinMap,reMap){
  const el=document.getElementById(elId);if(!el)return;
  const entries=Object.entries(totalMap).sort((a,b)=>b[1]-a[1]);
  if(!entries.length){el.innerHTML='<div class="empty">데이터 없음</div>';return;}
  const rows=entries.map(([k,v])=>{
    const shin=shinMap[k]||0,re=reMap[k]||0;
    const base=shin+re||1;
    const shinPct=Math.round(shin/base*100);
    const rePct=100-shinPct;
    return `<tr style="border-bottom:1px solid #f5f5f8;">
      <td style="padding:10px 12px;font-weight:700;font-size:14px;">${k}</td>
      <td style="text-align:right;padding:10px 12px;font-weight:700;">${v.toLocaleString()}건</td>
      <td style="text-align:right;padding:10px 12px;color:#6C63FF;">${shin.toLocaleString()}건</td>
      <td style="text-align:right;padding:10px 12px;color:#22c997;">${re.toLocaleString()}건</td>
      <td style="padding:10px 12px 10px 18px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="flex:1;height:6px;border-radius:3px;background:#f3f3f8;overflow:hidden;display:flex;">
            <div style="width:${shinPct}%;background:#6C63FF;height:100%;"></div>
            <div style="width:${rePct}%;background:#22c997;height:100%;"></div>
          </div>
          <span style="font-size:11px;color:#999;white-space:nowrap;">신차 ${shinPct}% / 재렌트 ${rePct}%</span>
        </div>
      </td>
    </tr>`;
  }).join('');
  el.innerHTML=`<table style="width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;">
    <colgroup><col style="width:18%;"><col style="width:13%;"><col style="width:13%;"><col style="width:13%;"><col style="width:43%;"></colgroup>
    <thead><tr style="border-bottom:2px solid #f0f0f8;">
      <th style="text-align:left;padding:8px 12px;color:#999;font-weight:500;">수행자</th>
      <th style="text-align:right;padding:8px 12px;color:#999;font-weight:500;">전체</th>
      <th style="text-align:right;padding:8px 12px;color:#999;font-weight:500;">신차</th>
      <th style="text-align:right;padding:8px 12px;color:#999;font-weight:500;">재렌트</th>
      <th style="text-align:left;padding:8px 12px 8px 18px;color:#999;font-weight:500;">출고비율</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}
function bindTooltips(){
  document.querySelectorAll('.tooltip-wrap').forEach(el=>{
    const tip=el.getAttribute('data-tip');if(!tip)return;let box=null;
    el.addEventListener('mouseenter',e=>{box=document.createElement('div');box.className='custom-tooltip';box.innerText=tip;document.body.appendChild(box);moveTip(box,e);});
    el.addEventListener('mousemove',e=>{if(box)moveTip(box,e);});
    el.addEventListener('mouseleave',()=>{if(box){box.remove();box=null;}});
  });
}
function moveTip(box,e){
  const bw=box.offsetWidth||160,bh=box.offsetHeight||50,vw=window.innerWidth,vh=window.innerHeight;
  let x=e.clientX+14,y=e.clientY-10;
  if(x+bw>vw-10)x=e.clientX-bw-10;if(y+bh>vh-10)y=vh-bh-10;
  box.style.left=x+'px';box.style.top=y+'px';
}
function calcPctGlobal(curr,prev){if(!prev)return null;return((curr-prev)/prev*100).toFixed(1);}
// 공지 팝업
function openNotice(){
  document.getElementById('noticePopup').style.display='flex';
  loadNotices();
}
function closeNotice(){
  document.getElementById('noticePopup').style.display='none';
}
document.getElementById('noticePopup').addEventListener('click',e=>{
  if(e.target===document.getElementById('noticePopup'))closeNotice();
});
const NOTICE_URL='https://script.google.com/macros/s/AKfycbwNszvunfsY5YWEYe6vE3OB5a7Tqqp_CYR8oxFuW5uP1OpKkXv7J7lLUTWNbLTrku6uDw/exec';

async function submitNotice(){
  const val=document.getElementById('noticeInput')?.value.trim();
  const nameVal=document.getElementById('noticeNameInput')?.value.trim()||'익명';
  if(!val)return;
  const btn=document.querySelector('#noticePopup button[onclick="submitNotice()"]');
  if(btn)btn.textContent='등록 중...';
  try{
    await fetch(NOTICE_URL,{method:'POST',body:JSON.stringify({action:'add',text:val,name:nameVal})});
    document.getElementById('noticeInput').value='';
    await loadNotices();
  }catch(e){console.error(e);}
  if(btn)btn.textContent='등록하기';
}

async function loadNotices(){
  const el=document.getElementById('noticeList');
  if(!el)return;
  el.innerHTML='<div style="font-size:12px;color:#ccc;text-align:center;padding:10px;">불러오는 중...</div>';
  try{
    const res=await fetch(NOTICE_URL);
    const data=await res.json();
    if(!data.length){el.innerHTML='<div style="font-size:12px;color:#ccc;text-align:center;padding:10px;">등록된 요청사항이 없어요</div>';return;}
    el.innerHTML=[...data].reverse().map((n,i)=>`
      <div style="padding:10px 12px;background:#f8f9fc;border-radius:8px;margin-bottom:6px;font-size:12px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
        <div style="flex:1;">
          <div style="display:flex;gap:8px;align-items:center;margin-bottom:3px;">
            <span style="font-weight:600;color:#6C63FF;">${n.name||'익명'}</span>
            <span style="color:#ddd;">|</span>
            <span style="color:#bbb;font-size:11px;">${n.time}</span>
          </div>
          <div style="color:#555;line-height:1.5;">${n.text}</div>
        </div>
        <button onclick="deleteNotice('${n.time}')"
          style="padding:3px 8px;border-radius:6px;font-size:11px;font-family:inherit;cursor:pointer;border:1px solid #e0e0ee;background:#fff;color:#FF6B6B;flex-shrink:0;">
          삭제
        </button>
      </div>`).join('');
  }catch(e){el.innerHTML='<div style="font-size:12px;color:#FF6B6B;text-align:center;padding:10px;">불러오기 실패</div>';}
}

async function deleteNotice(time){
  if(!confirm('삭제할까요?'))return;
  try{
    await fetch(NOTICE_URL,{method:'POST',body:JSON.stringify({action:'delete',time:time})});
    await loadNotices();
  }catch(e){console.error(e);}
}
