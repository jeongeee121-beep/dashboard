<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>판매현황 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#f8f9fc;color:#1c1c2e;}

header{background:#fff;border-bottom:1px solid #eee;padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-dot{width:10px;height:10px;border-radius:50%;background:#6C63FF;}
.logo-text{font-size:16px;font-weight:700;}
.header-right{font-size:12px;color:#999;}

.connect-bar{background:#fff;border-bottom:1px solid #eee;padding:12px 40px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.connect-bar label{font-size:12px;color:#888;}
.connect-bar input{padding:7px 12px;font-size:13px;font-family:inherit;border:1.5px solid #e8e8f0;border-radius:10px;background:#fafafa;color:#1c1c2e;}
.connect-bar input.wide{width:300px;}
.connect-bar input:focus{outline:none;border-color:#6C63FF;background:#fff;}
.btn-load{padding:7px 18px;background:#6C63FF;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;}
.btn-load:hover{background:#574fd6;}
#statusMsg{font-size:12px;}

.sheet-tabs{background:#fff;border-bottom:2px solid #eee;padding:0 40px;display:flex;overflow-x:auto;}
.sheet-tab{padding:14px 20px;font-size:14px;font-weight:500;color:#aaa;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.2s;font-family:inherit;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap;}
.sheet-tab:hover{color:#6C63FF;}
.sheet-tab.active{color:#6C63FF;border-bottom-color:#6C63FF;}
.tab-badge{display:inline-block;margin-left:6px;font-size:11px;background:#f0eeff;color:#6C63FF;padding:1px 7px;border-radius:20px;font-weight:500;}

main{max-width:1280px;margin:0 auto;padding:28px 40px;}
.page-title-wrap{text-align:center;margin-bottom:20px;}
.page-title{font-size:22px;font-weight:700;}
.page-subtitle{font-size:13px;color:#999;margin-top:4px;}

/* 기간 컨트롤 — 탭 안에 */
.period-ctrl{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px;}
.period-group{display:flex;gap:8px;flex-wrap:wrap;}
.period-btn{padding:8px 20px;border-radius:50px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;border:1.5px solid #e0e0ee;background:#fff;color:#888;transition:all 0.2s;}
.period-btn:hover{border-color:#6C63FF;color:#6C63FF;}
.period-btn.active{background:#6C63FF;color:#fff;border-color:#6C63FF;}
.month-sel{padding:8px 12px;border:1.5px solid #e0e0ee;border-radius:10px;font-size:13px;font-family:inherit;color:#333;background:#fff;cursor:pointer;display:none;}
.month-sel.show{display:inline-block;}

/* 추세 비교 버튼 */
.trend-btn{padding:8px 20px;border-radius:50px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;border:1.5px solid #FF6B6B;background:#fff;color:#FF6B6B;transition:all 0.2s;}
.trend-btn.active{background:#FF6B6B;color:#fff;}

/* 팝업 오버레이 */
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:none;align-items:center;justify-content:center;}
.popup-overlay.show{display:flex;}
.popup-box{background:#fff;border-radius:20px;padding:28px;width:92%;max-width:860px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
.popup-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.popup-title{font-size:16px;font-weight:700;}
.popup-close{background:none;border:none;font-size:22px;cursor:pointer;color:#aaa;line-height:1;}
.popup-close:hover{color:#333;}
.range-row{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.range-row select{padding:8px 12px;border:1.5px solid #e0e0ee;border-radius:10px;font-size:13px;font-family:inherit;background:#fff;cursor:pointer;}
.range-row select:focus{outline:none;border-color:#6C63FF;}
.range-sep{color:#aaa;font-size:14px;}
.range-apply{padding:8px 20px;background:#6C63FF;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;}
.range-apply:hover{background:#574fd6;}

/* 차종 필터 */
.series-filter{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.series-chip{padding:6px 14px;border-radius:50px;font-size:12px;font-family:inherit;cursor:pointer;border:1.5px solid #e0e0ee;background:#fff;color:#888;transition:all 0.2s;}
.series-chip:hover{border-color:#6C63FF;color:#6C63FF;}
.series-chip.active{background:#6C63FF;color:#fff;border-color:#6C63FF;}
.series-chip.all-chip.active{background:#1c1c2e;border-color:#1c1c2e;}

/* 월별 테이블 */
.trend-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:4px;}
.trend-table th{padding:10px 14px;background:#f8f9fc;font-weight:600;color:#555;text-align:center;border-bottom:2px solid #e8e8f0;}
.trend-table th:first-child{text-align:left;}
.trend-table td{padding:10px 14px;text-align:center;border-bottom:1px solid #f0f0f8;}
.trend-table td:first-child{text-align:left;font-weight:600;color:#333;}
.trend-table tr:last-child td{border-bottom:none;background:#f8f9fc;font-weight:700;}
.trend-table .shin{color:#6C63FF;font-weight:600;}
.trend-table .re{color:#22c997;font-weight:600;}
.trend-table .tot{color:#1c1c2e;font-weight:700;}
.trend-chart-wrap{position:relative;height:220px;margin-top:20px;}

/* 공통 카드 */
.metric-grid{display:grid;gap:16px;margin-bottom:24px;}
.g3{grid-template-columns:repeat(3,1fr);}
.g4{grid-template-columns:repeat(4,1fr);}
.metric-card{background:#fff;border-radius:16px;padding:20px 22px;border:1px solid #f0f0f8;position:relative;overflow:hidden;}
.metric-card::after{content:'';position:absolute;top:0;left:0;width:4px;height:100%;border-radius:16px 0 0 16px;}
.mc1::after{background:#6C63FF;}.mc2::after{background:#22c997;}.mc3::after{background:#FF6B6B;}.mc4::after{background:#FFA94D;}
.metric-label{font-size:12px;color:#999;margin-bottom:8px;}
.metric-value{font-size:28px;font-weight:700;letter-spacing:-1px;}
.metric-sub{font-size:11px;color:#bbb;margin-top:5px;}

.section-title{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.section-title::before{content:'';display:inline-block;width:4px;height:18px;background:#6C63FF;border-radius:2px;}

.chart-row{display:grid;gap:20px;margin-bottom:20px;}
.chart-row.two{grid-template-columns:1fr 1fr;}
.card{background:#fff;border-radius:16px;padding:24px;border:1px solid #f0f0f8;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.card-title{font-size:14px;font-weight:600;}
.card-badge{font-size:11px;color:#6C63FF;background:#f0eeff;padding:3px 10px;border-radius:20px;}

.stat-row{display:flex;gap:40px;padding:8px 0;flex-wrap:wrap;}
.stat-item{min-width:120px;}
.stat-label{font-size:12px;color:#999;margin-bottom:6px;}
.stat-val{font-size:30px;font-weight:700;letter-spacing:-1px;cursor:default;}
.stat-unit{font-size:13px;font-weight:500;color:#aaa;margin-left:3px;}

.donut-wrap{display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
.donut-canvas-wrap{position:relative;width:160px;height:160px;flex-shrink:0;}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;}
.donut-center-val{font-size:20px;font-weight:700;line-height:1;}
.donut-center-label{font-size:11px;color:#999;margin-top:3px;}
.donut-legend{flex:1;min-width:120px;}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:9px;font-size:13px;}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.legend-name{color:#333;flex:1;}
.legend-val{color:#999;font-size:12px;white-space:nowrap;}

.bar-item{margin-bottom:12px;}
.bar-item:last-child{margin-bottom:0;}
.bar-meta{display:flex;justify-content:space-between;margin-bottom:5px;}
.bar-name{font-size:13px;color:#333;}
.bar-count{font-size:12px;color:#999;}
.bar-track{background:#f3f3f8;border-radius:6px;height:7px;overflow:hidden;}
.bar-fill{height:100%;border-radius:6px;transition:width 0.8s cubic-bezier(0.4,0,0.2,1);}
.chart-wrap{position:relative;height:240px;}

.tooltip-wrap{cursor:default;}

/* 달력 기간 선택 */
.cal-wrap{display:none;gap:16px;flex-wrap:wrap;margin-bottom:16px;padding:16px;background:#f8f9fc;border-radius:12px;}
.cal-wrap.open{display:flex;}
.cal-box{flex:1;min-width:200px;}
.cal-box-title{font-size:11px;color:#999;margin-bottom:8px;font-weight:500;}
.cal-year-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.cal-year-btn{background:none;border:none;font-size:16px;cursor:pointer;color:#aaa;padding:0 4px;}
.cal-year-btn:hover{color:#6C63FF;}
.cal-year-label{font-size:13px;font-weight:700;color:#1c1c2e;}
.cal-months{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;}
.cal-month-btn{padding:6px 2px;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer;border:1.5px solid #e8e8f0;background:#fff;color:#555;transition:all 0.15s;text-align:center;}
.cal-month-btn:hover{border-color:#6C63FF;color:#6C63FF;}
.cal-month-btn.selected{background:#6C63FF;color:#fff;border-color:#6C63FF;}
.cal-month-btn.disabled{color:#ddd;cursor:default;border-color:#f0f0f8;}
.cal-range-display{text-align:center;font-size:13px;font-weight:600;color:#6C63FF;margin-bottom:10px;padding:9px 14px;background:#f0eeff;border-radius:10px;cursor:pointer;border:2px dashed #c5bfff;transition:all 0.2s;}
.cal-range-display:hover{background:#e8e2ff;border-color:#6C63FF;}
.custom-tooltip{position:fixed;background:#1c1c2e;color:#fff;font-size:13px;line-height:1.9;padding:10px 16px;border-radius:10px;pointer-events:none;white-space:pre;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.2);}
.empty{color:#ccc;font-size:13px;text-align:center;padding:40px;}
.sheet-panel{display:none;}
.sheet-panel.active{display:block;}

@media(max-width:900px){
  main{padding:20px 16px;}
  header,.connect-bar,.sheet-tabs{padding-left:16px;padding-right:16px;}
  .metric-grid.g3,.metric-grid.g4{grid-template-columns:repeat(2,1fr);}
  .chart-row.two{grid-template-columns:1fr;}
  .connect-bar input.wide{width:180px;}
}
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div><span class="logo-text">판매현황 대시보드</span></div>
  <span class="header-right" id="lastUpdate">데이터를 불러와 주세요</span>
</header>

<div class="connect-bar">
  <label>시트 ID</label>
  <input class="wide" id="sheetId" value="14j3hDW3Hn-1ftkJlqZhEZhWTt38eZU8S4yMoadenrR4"/>
  <button class="btn-load" onclick="loadAll()">불러오기</button>
  <span id="statusMsg"></span>
</div>

<div class="sheet-tabs" id="sheetTabs" style="display:none;">
  <button class="sheet-tab active" onclick="switchTab(0)" id="tab0">상품별 현황</button>
  <button class="sheet-tab" onclick="switchTab(1)" id="tab1">차량별 현황</button>
  <button class="sheet-tab" onclick="switchTab(2)" id="tab2">판매채널별 현황</button>
  <button class="sheet-tab" onclick="switchTab(3)" id="tab3">수행자별 현황</button>
</div>

<!-- 추세 팝업 -->
<div class="popup-overlay" id="trendPopup">
  <div class="popup-box">
    <div class="popup-header">
      <span class="popup-title" id="popupTitle">월별 추세 비교</span>
      <button class="popup-close" onclick="closePopup()">×</button>
    </div>
    <!-- 달력 기간 선택 -->
    <div class="cal-range-display" id="calRangeDisplay" onclick="toggleCalendar()">📅 기간을 선택해주세요 (클릭하여 변경)</div>
    <div class="cal-wrap" id="calWrap">
      <div class="cal-box">
        <div class="cal-box-title">시작 월</div>
        <div class="cal-year-row">
          <button class="cal-year-btn" onclick="moveYear('from',-1)">‹</button>
          <span class="cal-year-label" id="fromYearLabel">2025</span>
          <button class="cal-year-btn" onclick="moveYear('from',1)">›</button>
        </div>
        <div class="cal-months" id="fromMonths"></div>
      </div>
      <div class="cal-box">
        <div class="cal-box-title">종료 월</div>
        <div class="cal-year-row">
          <button class="cal-year-btn" onclick="moveYear('to',-1)">‹</button>
          <span class="cal-year-label" id="toYearLabel">2026</span>
          <button class="cal-year-btn" onclick="moveYear('to',1)">›</button>
        </div>
        <div class="cal-months" id="toMonths"></div>
      </div>
    </div>
    <!-- 차종 필터 (차량별현황만) -->
    <div id="seriesFilterWrap" style="display:none;margin-bottom:16px;">
      <div style="font-size:13px;color:#666;margin-bottom:10px;">차종 선택</div>
      <div class="series-filter" id="seriesFilterChips"></div>
    </div>
    <div id="popupContent"></div>
  </div>
</div>

<main>
  <!-- P0 상품별 현황 -->
  <div id="panel0" class="sheet-panel active">
    <div class="page-title-wrap"><div class="page-title">판매지원팀 판매현황</div><div class="page-subtitle" id="p0_sub"></div></div>
    <div class="period-ctrl">
      <div class="period-group">
        <button class="period-btn active" onclick="setPeriod(0,'month')" id="p0_btn_month">금월 현황</button>
        <button class="period-btn" onclick="setPeriod(0,'total')" id="p0_btn_total">누적 현황</button>
        <button class="period-btn" onclick="setPeriod(0,'year')" id="p0_btn_year">년도별</button>
        <button class="period-btn" onclick="setPeriod(0,'pick')" id="p0_btn_pick">월별 선택</button>
        <select class="month-sel" id="p0_yearPicker" onchange="renderP0()"><option value="">년도 선택</option></select>
        <select class="month-sel" id="p0_monthPicker" onchange="renderP0()"><option value="">월 선택</option></select>
      </div>
      <button class="trend-btn" onclick="openPopup(0)">📈 추세 비교</button>
    </div>
    <div id="p0_content"></div>
  </div>

  <!-- P1 차량별 현황 -->
  <div id="panel1" class="sheet-panel">
    <div class="page-title-wrap"><div class="page-title">차량별 현황</div><div class="page-subtitle" id="p1_sub"></div></div>
    <div class="period-ctrl">
      <div class="period-group">
        <button class="period-btn active" onclick="setPeriod(1,'month')" id="p1_btn_month">금월 현황</button>
        <button class="period-btn" onclick="setPeriod(1,'total')" id="p1_btn_total">누적 현황</button>
        <button class="period-btn" onclick="setPeriod(1,'year')" id="p1_btn_year">년도별</button>
        <button class="period-btn" onclick="setPeriod(1,'pick')" id="p1_btn_pick">월별 선택</button>
        <select class="month-sel" id="p1_yearPicker" onchange="renderP1()"><option value="">년도 선택</option></select>
        <select class="month-sel" id="p1_monthPicker" onchange="renderP1()"><option value="">월 선택</option></select>
      </div>
      <button class="trend-btn" onclick="openPopup(1)">📈 추세 비교</button>
    </div>
    <div id="p1_content"></div>
  </div>

  <!-- P2 판매채널별 -->
  <div id="panel2" class="sheet-panel">
    <div class="page-title-wrap"><div class="page-title">판매채널별 현황</div><div class="page-subtitle" id="p2_sub"></div></div>
    <div class="period-ctrl">
      <div class="period-group">
        <button class="period-btn active" onclick="setPeriod(2,'month')" id="p2_btn_month">금월 현황</button>
        <button class="period-btn" onclick="setPeriod(2,'total')" id="p2_btn_total">누적 현황</button>
        <button class="period-btn" onclick="setPeriod(2,'year')" id="p2_btn_year">년도별</button>
        <button class="period-btn" onclick="setPeriod(2,'pick')" id="p2_btn_pick">월별 선택</button>
        <select class="month-sel" id="p2_yearPicker" onchange="renderP2()"><option value="">년도 선택</option></select>
        <select class="month-sel" id="p2_monthPicker" onchange="renderP2()"><option value="">월 선택</option></select>
      </div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap;">
      <input type="text" id="p2_search" placeholder="🔍 판매채널 검색 (예: 오토원, 카투...)" oninput="onP2Search(this.value)"
        style="padding:9px 16px;font-size:13px;font-family:inherit;border:1.5px solid #e8e8f0;border-radius:50px;width:300px;outline:none;"/>
      <button onclick="onP2Search('');document.getElementById('p2_search').value='';"
        style="padding:8px 16px;border-radius:50px;font-size:12px;font-family:inherit;cursor:pointer;border:1.5px solid #e0e0ee;background:#fff;color:#888;">초기화</button>
    </div>
    <!-- 판매사 버튼 -->
    <div id="p2_seller_filter" style="display:none;margin-bottom:14px;">
      <div style="font-size:12px;color:#aaa;margin-bottom:8px;">📦 판매사 선택</div>
      <div id="p2_seller_chips" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
    </div>
    <!-- 판매사 상세 테이블 -->
    <div id="p2_dealer_detail" style="display:none;margin-bottom:20px;"></div>
    <div id="p2_content"></div>
  </div>

  <div id="panel3" class="sheet-panel">
    <div class="page-title-wrap"><div class="page-title">수행자별 현황</div><div class="page-subtitle" id="p3_sub"></div></div>
    <div class="period-ctrl">
      <div class="period-group">
        <button class="period-btn active" onclick="setPeriod(3,'month')" id="p3_btn_month">금월 현황</button>
        <button class="period-btn" onclick="setPeriod(3,'total')" id="p3_btn_total">누적 현황</button>
        <button class="period-btn" onclick="setPeriod(3,'year')" id="p3_btn_year">년도별</button>
        <button class="period-btn" onclick="setPeriod(3,'pick')" id="p3_btn_pick">월별 선택</button>
        <select class="month-sel" id="p3_yearPicker" onchange="renderP3()"><option value="">년도 선택</option></select>
        <select class="month-sel" id="p3_monthPicker" onchange="renderP3()"><option value="">월 선택</option></select>
      </div>
    </div>
    <div id="p3_worker_filter" style="display:none;padding:0 0 16px 0;display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
      <span style="font-size:12px;color:#aaa;">수행자</span>
      <div id="p3_worker_chips" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
    </div>
    <div id="p3_content"></div>
  </div>
</main>

<script>
const COLORS=['#6C63FF','#22c997','#FF6B6B','#FFA94D','#4dabf7','#f06595','#a9e34b','#74c0fc','#e599f7','#ffd43b'];

// 판매사 → {채널그룹, 수행자, 원수행자} 매핑
const DEALER_MAP = {
  '카투':        {group:'오토원', worker:'신선미', origin:'신선미'},
  '오토리지':    {group:'오토원', worker:'조복경', origin:'나장열'},
  '씨에스카':    {group:'오토원', worker:'조복경', origin:'조복경'},
  '시현':        {group:'오토원', worker:'조복경', origin:'최형용'},
  '스윗코':      {group:'오토원', worker:'조복경', origin:'이진희'},

async function loadAll(){
  const id=document.getElementById('sheetId').value.trim();
  if(!id){setStatus('시트 ID를 입력해주세요.',false);return;}
  setStatus('불러오는 중...',null);
  const url=`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent('시트1')}`;
  try{
    const res=await fetch(url);const text=await res.text();
    const match=text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
    if(!match)throw new Error('파싱 실패');
    const json=JSON.parse(match[1]);
    if(!json.table?.rows?.length)throw new Error('데이터 없음');
    rawTable=json.table;
    const now=new Date();
    document.getElementById('lastUpdate').textContent=`${now.toLocaleDateString('ko-KR')} ${now.toLocaleTimeString('ko-KR')} 기준`;
    document.getElementById('sheetTabs').style.display='flex';
    [0,1,2,3].forEach(i=>setBadge(`tab${i}`,rawTable.rows.length));
    populatePickers();
    renderP0();
    setStatus(`✓ ${rawTable.rows.length.toLocaleString()}건`,true);
  }catch(e){setStatus('❌ '+e.message,false);}
}

function setBadge(tabId,count){
  const old=document.getElementById(tabId).querySelector('.tab-badge');if(old)old.remove();
  const b=document.createElement('span');b.className='tab-badge';b.textContent=count.toLocaleString()+'건';
  document.getElementById(tabId).appendChild(b);
}

function getRows(){
  const cols=rawTable.cols.map(c=>c.label);
  const rows=rawTable.rows.map(r=>r.c.map(c=>c?c.v:null));
  const idx=n=>cols.findIndex(c=>c&&c.includes(n));
  return{cols,rows,idx};
}

function getYM(v){
  if(!v)return null;
  const d=v.toString().match(/Date\((\d{4}),(\d+),(\d+)\)/);
  if(d)return`${d[1]}.${String(parseInt(d[2])+1).padStart(2,'0')}`;
  const m=v.toString().match(/(\d{4})[.\-\/](\d{1,2})/);
  return m?`${m[1]}.${m[2].padStart(2,'0')}`:null;
}

function thisMonth(){const n=new Date();return`${n.getFullYear()}.${String(n.getMonth()+1).padStart(2,'0')}`;}

function filterRows(rows,iDate,tab){
  const p=periodState[tab];
  if(p==='total')return rows;
  if(p==='month')return rows.filter(r=>getYM(r[iDate])===thisMonth());
  if(p==='year'){
    const yp=document.getElementById(`p${tab}_yearPicker`);
    const yr=yp?yp.value:'';
    return yr?rows.filter(r=>{const ym=getYM(r[iDate]);return ym&&ym.startsWith(yr);}):rows;
  }
  const picked=document.getElementById(`p${tab}_monthPicker`).value;
  return picked?rows.filter(r=>getYM(r[iDate])===picked):[];
}

function getPeriodLabel(tab){
  const p=periodState[tab];
  if(p==='month'){const n=new Date();return`${n.getFullYear()}년 ${n.getMonth()+1}월`;}
  if(p==='total')return'전체 누적';
  if(p==='year'){const yp=document.getElementById(`p${tab}_yearPicker`);const yr=yp?yp.value:'';return yr?yr+'년 전체':'년도 선택';}
  const picked=document.getElementById(`p${tab}_monthPicker`).value;
  return picked?picked.replace('.',`년 `)+'월':'월 선택';
}

function getAllMonths(rows,iDate){
  const s=new Set();rows.forEach(r=>{const m=getYM(r[iDate]);if(m)s.add(m);});
  return[...s].sort();
}

function populatePickers(){
  const{rows,idx}=getRows();const iDate=idx('계약실행일');
  const months=getAllMonths(rows,iDate).reverse();
  const years=[...new Set(months.map(m=>m.split('.')[0]))].sort().reverse();
  [0,1,2,3].forEach(tab=>{
    const sel=document.getElementById(`p${tab}_monthPicker`);
    sel.innerHTML='<option value="">월 선택</option>'+months.map(m=>`<option value="${m}">${m}</option>`).join('');
    const ysel=document.getElementById(`p${tab}_yearPicker`);
    if(ysel)ysel.innerHTML='<option value="">년도 선택</option>'+years.map(y=>`<option value="${y}">${y}년</option>`).join('');
  });
  // 달력 기본값: 최근 1년
  const now=new Date();
  const toY=now.getFullYear(), toM=now.getMonth()+1;
  const fromDate=new Date(now.getFullYear()-1,now.getMonth()+1,1);
  const fromY=fromDate.getFullYear(), fromM=fromDate.getMonth()+1;
  calFrom={year:fromY,month:fromM};
  calTo={year:toY,month:toM};
}

function countMap(arr,keyFn){const m={};arr.forEach(r=>{const v=keyFn(r);if(v!=null&&v!==''){m[v]=(m[v]||0)+1;}});return m;}
function avgVal(arr,iR){
  if(iR<0||!arr.length)return'-';
  const v=arr.map(r=>parseFloat((r[iR]||'').toString().replace(/[^0-9.-]/g,''))).filter(v=>!isNaN(v)&&v>0);
  if(!v.length)return'-';
  return Math.round(v.reduce((a,b)=>a+b,0)/v.length).toLocaleString()+'원';
}

function renderCalSide(side, state, yearEl, monthsEl){

function updateRangeDisplay(){

function buildSeriesChips(){
  const{rows,idx}=getRows();const iSeries=idx('시리즈명');
  const all=new Set();rows.forEach(r=>{const v=(r[iSeries]||'').toString().trim();if(v)all.add(v);});
  const sorted=[...all].sort();
  const wrap=document.getElementById('seriesFilterChips');
  wrap.innerHTML=`<button class="series-chip all-chip active" onclick="toggleSeries('__all__')">전체</button>`
    +sorted.map(s=>`<button class="series-chip" onclick="toggleSeries('${s}')" id="chip_${CSS.escape(s)}">${s}</button>`).join('');
  selectedSeries=new Set(['__all__']);
}

function toggleSeries(s){
  if(s==='__all__'){
    selectedSeries=new Set(['__all__']);
    document.querySelectorAll('.series-chip').forEach(el=>el.classList.remove('active'));
    document.querySelector('.all-chip').classList.add('active');
  } else {
    selectedSeries.delete('__all__');
    document.querySelector('.all-chip').classList.remove('active');
    if(selectedSeries.has(s)){selectedSeries.delete(s);document.getElementById(`chip_${CSS.escape(s)}`)?.classList.remove('active');}
    else{selectedSeries.add(s);document.getElementById(`chip_${CSS.escape(s)}`)?.classList.add('active');}
    if(selectedSeries.size===0){selectedSeries.add('__all__');document.querySelector('.all-chip').classList.add('active');}
  }
  applyRange();
}

function applyRange(){
  if(!rawTable)return;
  if(!calFrom.month||!calTo.month)return;
  const from=`${calFrom.year}.${String(calFrom.month).padStart(2,'0')}`;
  const to=`${calTo.year}.${String(calTo.month).padStart(2,'0')}`;
  if(from>to)return;
  const{rows,idx}=getRows();
  const iDate=idx('계약실행일'),iProd=idx('상품구분'),iSeries=idx('시리즈명');
  const allMonths=getAllMonths(rows,iDate).filter(m=>m>=from&&m<=to);

  let filtered=rows;
  if(popupTab===1&&!selectedSeries.has('__all__')){
    filtered=rows.filter(r=>selectedSeries.has((r[iSeries]||'').toString().trim()));
  }

  // 미리 월별로 카운트 집계 (전체 스캔 1회만)
  const shinMap={}, reMap={}, totMap={};
  allMonths.forEach(m=>{shinMap[m]=0;reMap[m]=0;totMap[m]=0;});
  filtered.forEach(r=>{
    const m=getYM(r[iDate]);
    if(!m||m<from||m>to)return;
    const prod=(r[iProd]||'');
    totMap[m]=(totMap[m]||0)+1;
    if(prod.includes('신차'))shinMap[m]=(shinMap[m]||0)+1;
    else if(prod.includes('재렌트')||prod.includes('재'))reMap[m]=(reMap[m]||0)+1;
  });

  const totalShin=allMonths.reduce((a,m)=>a+(shinMap[m]||0),0);
  const totalRe=allMonths.reduce((a,m)=>a+(reMap[m]||0),0);
  const totalTot=allMonths.reduce((a,m)=>a+(totMap[m]||0),0);

  const rows_html=allMonths.map(m=>`
    <tr>
      <td>${m}</td>
      <td class="shin">${shinMap[m]||0}</td>
      <td class="re">${reMap[m]||0}</td>
      <td class="tot">${totMap[m]||0}</td>
    </tr>`).join('');

  const content=document.getElementById('popupContent');
  content.innerHTML=`
    <div class="trend-chart-wrap"><canvas id="trendLineChart"></canvas></div>
    <div style="overflow-x:auto;margin-top:20px;">
      <table class="trend-table">
        <thead><tr><th>월</th><th>신차 출고</th><th>재렌트 출고</th><th>총 출고</th></tr></thead>
        <tbody>
          ${rows_html}
          <tr><td>합계</td><td class="shin">${totalShin}</td><td class="re">${totalRe}</td><td class="tot">${totalTot}</td></tr>
        </tbody>
      </table>
    </div>`;

  requestAnimationFrame(()=>{
    const canvas=document.getElementById('trendLineChart');
    if(!canvas)return;
    if(charts['trendLine'])charts['trendLine'].destroy();
    charts['trendLine']=new Chart(canvas.getContext('2d'),{
      type:'line',
      data:{
        labels:allMonths,
        datasets:[
          {label:'신차',data:allMonths.map(m=>shinMap[m]||0),borderColor:'#6C63FF',backgroundColor:'rgba(108,99,255,0.08)',tension:0.4,pointRadius:4,fill:true},
          {label:'재렌트',data:allMonths.map(m=>reMap[m]||0),borderColor:'#22c997',backgroundColor:'rgba(34,201,151,0.06)',tension:0.4,pointRadius:4,fill:true},
          {label:'총 출고',data:allMonths.map(m=>totMap[m]||0),borderColor:'#FF6B6B',backgroundColor:'rgba(255,107,107,0.04)',tension:0.4,pointRadius:4,borderDash:[5,3],fill:false},
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'bottom',labels:{font:{size:12},usePointStyle:true}}},
        scales:{
          x:{grid:{display:false},border:{display:false},ticks:{font:{size:11}}},
          y:{grid:{color:'#f0f0f8'},border:{display:false},ticks:{font:{size:11}},beginAtZero:true}
        }
      }
    });
  });
}

  const insuRows=filtered.filter(r=>isInsu(r[iEnd]));

  const dongbanInsu=insuRows.filter(r=>(r[iType]||'').includes('동반차')).length;
  const gudokInsu=insuRows.filter(r=>(r[iType]||'').includes('구독')).length;
  const shinAvg=avgVal(shincha,iRental),rerentAvg=avgVal(rerent,iRental);

  // 누적현황일 때 연도별 요약 테이블

        const mRe=mData.filter(r=>{const v=(r[iProd]||'');return v.includes('재렌트')||v.includes('재');}).length;

function setSellerFilter(s){
  selectedSeller = s;
  document.querySelectorAll('#p2_seller_chips .seller-chip').forEach(el=>{
    el.classList.toggle('active', el.getAttribute('data-seller')===s);
  });

function renderP2(){
  if(!rawTable) return;
  const{rows,idx} = getRows();
  const iDate=idx('계약실행일'), iProd=idx('상품구분'), iChannel=idx('판매채널');
  const iRental=idx('렌탈료'), iSeller=idx('판매사');

  const allFiltered = filterRows(rows, iDate, 2);
  const q = (chSearchQuery||'').trim().toLowerCase();

  // 1. 채널 검색어로 1차 필터 (빈값은 미입력으로)
  const byChannel = q
    ? allFiltered.filter(r => {
        const ch = (r[iChannel]||'미입력').toString().toLowerCase();
        const sl = (r[iSeller]||'미입력').toString().toLowerCase();
        return ch.includes(q) || sl.includes(q);
      })
    : allFiltered;

  // 2. 판매사 버튼 렌더
  const sellerWrap = document.getElementById('p2_seller_filter');
  const sellerChips = document.getElementById('p2_seller_chips');
  if(q && iSeller >= 0 && sellerWrap && sellerChips){
    const sellers = [...new Set(
      byChannel.map(r => (r[iSeller]||'').toString().trim() || '(미입력)')
    )].filter(s => s !== '(미입력)').sort();

    if(sellers.length > 0){
      sellerWrap.style.display = 'block';
      sellerChips.innerHTML =
        `<button class="seller-chip series-chip all-chip${selectedSeller==='__all__'?' active':''}" data-seller="__all__" onclick="setSellerFilter('__all__')">전체</button>` +
        sellers.map(s =>
          `<button class="seller-chip series-chip${selectedSeller===s?' active':''}" data-seller="${s}" onclick="setSellerFilter('${s.replace(/'/g,"\'")}')">
            ${s}
          </button>`
        ).join('');
    } else {
      sellerWrap.style.display = 'none';
    }
  } else if(sellerWrap){
    sellerWrap.style.display = 'none';
  }

  // 3. 판매사 2차 필터
  const filtered = selectedSeller === '__all__'
    ? byChannel
    : byChannel.filter(r => (r[iSeller]||'').toString().trim() === selectedSeller ||
        (selectedSeller==='(미입력)' && !(r[iSeller]||'').toString().trim()));

  document.getElementById('p2_sub').textContent =
    `${getPeriodLabel(2)} 기준 · ${allFiltered.length.toLocaleString()}건` +
    (q ? ` · "${chSearchQuery}" 검색 (${filtered.length}건)` : '') +
    (selectedSeller!=='__all__' ? ` · ${selectedSeller}` : '');

  // 4. 판매사 상세 테이블 (검색 시)
  const dealerDetail = document.getElementById('p2_dealer_detail');
  if(q && filtered.length > 0 && iSeller >= 0){
    const sellerStats = {};
    filtered.forEach(r => {
      const ch = (r[iChannel]||'미입력').toString().trim();
      const sl = (r[iSeller]||'미입력').toString().trim() || '(미입력)';
      const info = getChannelGroup(ch) || getChannelGroup(sl);
      if(!sellerStats[sl]) sellerStats[sl] = {total:0,shin:0,re:0,info};
      sellerStats[sl].total++;
      if((r[iProd]||'').includes('신차')) sellerStats[sl].shin++;
      if((r[iProd]||'').includes('재렌트')||(r[iProd]||'').includes('재')) sellerStats[sl].re++;
    });
    const sellerRows = Object.entries(sellerStats).sort((a,b)=>b[1].total-a[1].total);
    dealerDetail.style.display = 'block';
    dealerDetail.innerHTML = `
      <div class="card">
        <div class="card-header">
          <span class="card-title">판매사별 상세</span>

              <td style="padding:9px 12px;font-weight:600;">

            </tr>`).join('')}
          </tbody>

  } else if(dealerDetail){
    dealerDetail.style.display = 'none';

  // 5. 차트/통계

  const chAll  = iChannel>=0 ? countMap(filtered, r=>(r[iChannel]||'미입력').toString().trim()) : {};
  const chShin = iChannel>=0 ? countMap(shincha,  r=>(r[iChannel]||'미입력').toString().trim()) : {};
  const chRe   = iChannel>=0 ? countMap(rerent,   r=>(r[iChannel]||'미입력').toString().trim()) : {};
  const chAvgMap = {};
  if(iChannel>=0 && iRental>=0){
    const m={};
    filtered.forEach(r=>{
      const ch=(r[iChannel]||'미입력').toString().trim();
      const v=parseFloat((r[iRental]||'').toString().replace(/[^0-9.-]/g,''));
      if(!isNaN(v)&&v>0){if(!m[ch])m[ch]=[];m[ch].push(v);}
    });
    Object.entries(m).forEach(([k,a])=>{chAvgMap[k]=Math.round(a.reduce((x,y)=>x+y,0)/a.length);});
  }
  const topCh = Object.entries(chAll).sort((a,b)=>b[1]-a[1]);

  document.getElementById('p2_content').innerHTML=`
    <div class="metric-grid g4" style="margin-bottom:24px;">
      <div class="metric-card mc1"><div class="metric-label">${q?'검색 결과':'전체 계약'}</div><div class="metric-value">${filtered.length.toLocaleString()}</div></div>
      <div class="metric-card mc2"><div class="metric-label">채널 수</div><div class="metric-value">${Object.keys(chAll).length}</div></div>
      <div class="metric-card mc3"><div class="metric-label">TOP 채널</div><div class="metric-value" style="font-size:18px;">${topCh[0]?.[0]||'-'}</div><div class="metric-sub">${topCh[0]?.[1]||0}건</div></div>

        </div><div class="donut-legend" id="legend_ch_all"></div></div>

    </div>`;

  renderDonut('donut_ch_all','legend_ch_all',chAll);
  renderBar('ch_shin_bar',chShin,8);
  renderBar('ch_re_bar',chRe,8);
  const avgEntries=Object.entries(chAvgMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxAvg=avgEntries[0]?.[1]||1;
  const avgEl=document.getElementById('ch_avg_bar');
  if(avgEl) avgEl.innerHTML=avgEntries.map(([k,v],i)=>`

function renderP3(){
  if(!rawTable)return;
  const{rows,idx}=getRows();
  const iDate=idx('계약실행일'),iProd=idx('상품구분'),iWorker=idx('수행원'),iType=idx('상품유형'),iNoDepo=idx('무보증여부'),iEnd=idx('종료후처리');
  const allFiltered=filterRows(rows,iDate,3);

  // 수행자 목록 추출 → 칩 버튼 생성
  const allWorkers=[...new Set(allFiltered.map(r=>mapWorker(r[iWorker])).filter(Boolean))].sort();
  const chipsEl=document.getElementById('p3_worker_chips');
  if(chipsEl){
    chipsEl.innerHTML=
      `<button class="series-chip all-chip${selectedWorker==='__all__'?' active':''}" onclick="setWorker('__all__')">전체</button>`+
      allWorkers.map(w=>`<button class="series-chip${selectedWorker===w?' active':''}" onclick="setWorker('${w}')">${w}</button>`).join('');
  }

  // 선택된 수행자로 필터
  const filtered = selectedWorker==='__all__' ? allFiltered
    : allFiltered.filter(r=>mapWorker(r[iWorker])===selectedWorker);

  document.getElementById('p3_sub').textContent=`${getPeriodLabel(3)} 기준 · ${filtered.length.toLocaleString()}건`+(selectedWorker!=='__all__'?` · ${selectedWorker}`:'');

  const isNoDepo=v=>(v||'').toString().trim()==='Y';
  const isInsu=v=>(v||'').toString().trim()==='양도(인수)';

  // 수행자별 집계
  const wStats={};
  filtered.forEach(r=>{
    const name=mapWorker(r[iWorker]);if(!name)return;
    if(!wStats[name])wStats[name]={total:0,shin:0,re:0,insu:0,noDepo:0};
    const s=wStats[name];s.total++;
    if((r[iProd]||'').includes('신차'))s.shin++;
    if((r[iProd]||'').includes('재렌트')||(r[iProd]||'').includes('재'))s.re++;
    if(iEnd>=0&&isInsu(r[iEnd]))s.insu++;
    if(iNoDepo>=0&&isNoDepo(r[iNoDepo]))s.noDepo++;
  });
  const sorted=Object.entries(wStats).sort((a,b)=>b[1].total-a[1].total);
  const totalAll=filtered.length;

  // 상품유형별 집계
  const typeMap=countMap(filtered,r=>(r[iType]||'').toString().trim());
  const shinTypeMap=countMap(filtered.filter(r=>(r[iProd]||'').includes('신차')),r=>(r[iType]||'').toString().trim());
  const reTypeMap=countMap(filtered.filter(r=>{const v=(r[iProd]||'');return v.includes('재렌트')||v.includes('재');}),r=>(r[iType]||'').toString().trim());

  // 월별 추세 (최근 12개월)
  const allMonths=[...new Set(allFiltered.map(r=>getYM(r[iDate])).filter(Boolean))].sort().slice(-12);
  const shinByM={},reByM={};
  allMonths.forEach(m=>{shinByM[m]=0;reByM[m]=0;});
  filtered.forEach(r=>{
    const m=getYM(r[iDate]);if(!m||!shinByM.hasOwnProperty(m))return;
    if((r[iProd]||'').includes('신차'))shinByM[m]++;
    else if((r[iProd]||'').includes('재렌트')||(r[iProd]||'').includes('재'))reByM[m]++;
  });

  const noDepoTotal=filtered.filter(r=>isNoDepo(r[iNoDepo])).length;

  document.getElementById('p3_content').innerHTML=`
    <div class="metric-grid g4" style="margin-bottom:24px;">
      <div class="metric-card mc1"><div class="metric-label">전체 계약</div><div class="metric-value">${totalAll.toLocaleString()}</div></div>
      <div class="metric-card mc2"><div class="metric-label">신차</div><div class="metric-value">${filtered.filter(r=>(r[iProd]||'').includes('신차')).length}</div></div>
      <div class="metric-card mc3"><div class="metric-label">재렌트</div><div class="metric-value">${filtered.filter(r=>{const v=(r[iProd]||'');return v.includes('재렌트')||v.includes('재');}).length}</div></div>
      <div class="metric-card mc4"><div class="metric-label">무보증</div><div class="metric-value">${noDepoTotal}</div></div>
    </div>

    <div class="section-title">상품유형별 현황</div>
    <div class="chart-row two" style="margin-bottom:20px;">
      <div class="card">
        <div class="card-header"><span class="card-title">신차 상품유형</span><span class="card-badge">${filtered.filter(r=>(r[iProd]||'').includes('신차')).length}건</span></div>
        <div class="donut-wrap">
          <div class="donut-canvas-wrap"><canvas id="donut_p3_shin"></canvas><div class="donut-center"><div class="donut-center-val">${filtered.filter(r=>(r[iProd]||'').includes('신차')).length}</div><div class="donut-center-label">신차</div></div></div>
          <div class="donut-legend" id="legend_p3_shin"></div>
        </div>
        <div style="margin-top:14px;padding-top:14px;border-top:1px solid #f0f0f8;">
          <span style="font-size:12px;color:#999;">무보증</span>
          <span style="font-size:22px;font-weight:700;color:#6C63FF;margin-left:10px;">${filtered.filter(r=>(r[iProd]||'').includes('신차')&&isNoDepo(r[iNoDepo])).length}</span>
          <span style="font-size:13px;color:#aaa;">건</span>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">재렌트 상품유형</span><span class="card-badge">${filtered.filter(r=>{const v=(r[iProd]||'');return v.includes('재렌트')||v.includes('재');}).length}건</span></div>
        <div class="donut-wrap">
          <div class="donut-canvas-wrap"><canvas id="donut_p3_re"></canvas><div class="donut-center"><div class="donut-center-val">${filtered.filter(r=>{const v=(r[iProd]||'');return v.includes('재렌트')||v.includes('재');}).length}</div><div class="donut-center-label">재렌트</div></div></div>
          <div class="donut-legend" id="legend_p3_re"></div>
        </div>
        <div style="margin-top:14px;padding-top:14px;border-top:1px solid #f0f0f8;">
          <span style="font-size:12px;color:#999;">무보증</span>
          <span style="font-size:22px;font-weight:700;color:#22c997;margin-left:10px;">${filtered.filter(r=>{const v=(r[iProd]||'');return(v.includes('재렌트')||v.includes('재'))&&isNoDepo(r[iNoDepo]);}).length}</span>
          <span style="font-size:13px;color:#aaa;">건</span>
        </div>
      </div>
    </div>

    <div class="section-title">월별 추세 (신차 / 재렌트)</div>
    <div class="card" style="margin-bottom:20px;">
      <div style="position:relative;height:220px;"><canvas id="p3_trend_chart"></canvas></div>
    </div>

    <div class="section-title">수행자별 상세</div>
    <div class="card" style="margin-bottom:40px;overflow-x:auto;">
      <table style="width:100%;border-collapse:collapse;font-size:13px;">
        <thead><tr style="border-bottom:2px solid #f0f0f8;">
          <th style="text-align:left;padding:10px 12px;color:#999;font-weight:500;">수행자</th>
          <th style="text-align:right;padding:10px 12px;color:#999;font-weight:500;">전체</th>
          <th style="text-align:right;padding:10px 12px;color:#999;font-weight:500;">신차</th>
          <th style="text-align:right;padding:10px 12px;color:#999;font-weight:500;">재렌트</th>
          <th style="text-align:right;padding:10px 12px;color:#999;font-weight:500;">인수형</th>
          <th style="text-align:right;padding:10px 12px;color:#999;font-weight:500;">무보증</th>
        </tr></thead>
        <tbody>${sorted.map(([name,s],i)=>`
          <tr style="border-bottom:1px solid #f8f8fc;">
            <td style="padding:10px 12px;font-weight:600;"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${COLORS[i%COLORS.length]};margin-right:8px;"></span>${name}</td>
            <td style="text-align:right;padding:10px 12px;font-weight:700;">${s.total}</td>
            <td style="text-align:right;padding:10px 12px;color:#6C63FF;">${s.shin}</td>
            <td style="text-align:right;padding:10px 12px;color:#22c997;">${s.re}</td>
            <td style="text-align:right;padding:10px 12px;color:#FF6B6B;">${s.insu}</td>
            <td style="text-align:right;padding:10px 12px;color:#FFA94D;">${s.noDepo}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;

  renderDonut('donut_p3_shin','legend_p3_shin',shinTypeMap);
  renderDonut('donut_p3_re','legend_p3_re',reTypeMap);

  // 월별 추세 차트
  const tCanvas=document.getElementById('p3_trend_chart');
  if(tCanvas){
    if(charts['p3_trend'])charts['p3_trend'].destroy();
    charts['p3_trend']=new Chart(tCanvas.getContext('2d'),{
      type:'bar',
      data:{
        labels:allMonths,
        datasets:[
          {label:'신차',data:allMonths.map(m=>shinByM[m]||0),backgroundColor:'#6C63FF',borderRadius:4,borderSkipped:false},
          {label:'재렌트',data:allMonths.map(m=>reByM[m]||0),backgroundColor:'#22c997',borderRadius:4,borderSkipped:false},
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'bottom',labels:{font:{size:12},usePointStyle:true}}},
        scales:{
          x:{grid:{display:false},border:{display:false},ticks:{font:{size:11},maxRotation:45}},
          y:{grid:{color:'#f0f0f8'},border:{display:false},ticks:{font:{size:11}},beginAtZero:true,stacked:false}
        }
      }
    });
  }
}

function setSellerFilter(s){
  selectedSeller=s;
  document.querySelectorAll('.seller-chip').forEach(el=>{
    el.classList.toggle('active', el.getAttribute('data-seller')===s);
  });
  renderP2();
}

function setWorker(w){
  selectedWorker=w;
  renderP3();
}

function renderDonut(canvasId,legendId,dataMap){
  const entries=Object.entries(dataMap).sort((a,b)=>b[1]-a[1]);
  const total=entries.reduce((s,[,v])=>s+v,0);
  const canvas=document.getElementById(canvasId);const legendEl=document.getElementById(legendId);
  if(!canvas||!legendEl)return;
  if(!entries.length){canvas.parentElement.innerHTML='<div class="empty">데이터 없음</div>';return;}
  if(charts[canvasId])charts[canvasId].destroy();
  charts[canvasId]=new Chart(canvas.getContext('2d'),{type:'doughnut',data:{labels:entries.map(([k])=>k),datasets:[{data:entries.map(([,v])=>v),backgroundColor:COLORS,borderWidth:2,borderColor:'#fff',hoverOffset:6}]},options:{cutout:'68%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${ctx.raw}건 (${Math.round(ctx.raw/total*100)}%)`}}},animation:{animateRotate:true,duration:700}}});
  legendEl.innerHTML=entries.slice(0,7).map(([k,v],i)=>`<div class="legend-item"><div class="legend-dot" style="background:${COLORS[i%COLORS.length]}"></div><span class="legend-name">${k}</span><span class="legend-val">${v}건 · ${Math.round(v/total*100)}%</span></div>`).join('');
}

function renderBar(elId,dataMap,limit=7){
  const el=document.getElementById(elId);if(!el)return;
  const entries=Object.entries(dataMap).sort((a,b)=>b[1]-a[1]).slice(0,limit);
  const total=entries.reduce((s,[,v])=>s+v,0);
  if(!entries.length){el.innerHTML='<div class="empty">데이터 없음</div>';return;}
  el.innerHTML=entries.map(([k,v],i)=>`<div class="bar-item"><div class="bar-meta"><span class="bar-name">${k}</span><span class="bar-count">${v.toLocaleString()}건 · ${Math.round(v/total*100)}%</span></div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/total*100)}%;background:${COLORS[i%COLORS.length]};"></div></div></div>`).join('');
}

function bindTooltips(){
  document.querySelectorAll('.tooltip-wrap').forEach(el=>{
    const tip=el.getAttribute('data-tip');if(!tip)return;let box=null;
    el.addEventListener('mouseenter',e=>{box=document.createElement('div');box.className='custom-tooltip';box.innerText=tip;document.body.appendChild(box);moveTip(box,e);});
    el.addEventListener('mousemove',e=>{if(box)moveTip(box,e);});
    el.addEventListener('mouseleave',()=>{if(box){box.remove();box=null;}});
  });
}
function moveTip(box,e){
  const bw=box.offsetWidth||160,bh=box.offsetHeight||60,vw=window.innerWidth,vh=window.innerHeight;
  let x=e.clientX+16,y=e.clientY-10;
  if(x+bw>vw-10)x=e.clientX-bw-10;if(y+bh>vh-10)y=vh-bh-10;
  box.style.left=x+'px';box.style.top=y+'px';
}
</script>
</body>
</html>
